name: stage4d-selfpatch

on:
  push:
    branches:
      - agent/stage4d-auto-approval-foundation

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[stage4d-selfpatch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage4d-auto-approval-foundation
      - name: Apply focused diagnostic patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          engine_path = Path('src/server/auto_approval_engine_v1.js')
          engine = engine_path.read_text(encoding='utf-8')
          old = "throw new AutoApprovalError('APPROVAL_EVENT_MISMATCH', '批准索引与公共事件不一致', 500, { approvalId: index.approvalId });"
          new = "throw new AutoApprovalError('APPROVAL_EVENT_MISMATCH', `批准索引与公共事件不一致:${canonicalize({ index, event })}`, 500, { approvalId: index.approvalId });"
          if old not in engine:
              raise SystemExit('engine diagnostic target not found')
          engine_path.write_text(engine.replace(old, new, 1), encoding='utf-8')

          test_path = Path('tests/stage4d-foundation-boundary.test.mjs')
          test = test_path.read_text(encoding='utf-8')
          old_test = "assert.match(generated, /const APP_VERSION = '8\\.2\\.28';/);"
          new_test = "assert.match(generated, /const APP_VERSION = '[0-9]+\\.[0-9]+\\.[0-9]+';/);"
          if old_test not in test:
              raise SystemExit('boundary version target not found')
          test_path.write_text(test.replace(old_test, new_test, 1), encoding='utf-8')
          PY
          git config user.name "stage4d-maintenance"
          git config user.email "stage4d-maintenance@users.noreply.github.com"
          git add src/server/auto_approval_engine_v1.js tests/stage4d-foundation-boundary.test.mjs
          git commit -m "诊断4D：输出并发索引差异并修正版本边界 [stage4d-selfpatch]"
          git push origin HEAD:agent/stage4d-auto-approval-foundation

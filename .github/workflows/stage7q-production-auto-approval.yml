name: stage7q-production-auto-approval

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/server/production_write_runtime_v1.js'
      - 'src/server/production_write_http_v1.js'
      - 'src/server/auto_approval_engine_v1.js'
      - 'src/server/submission_acceptance_v1.js'
      - 'tests/stage7p-production-device-and-exact-submission.test.mjs'
      - 'tests/stage7q-production-auto-approval.test.mjs'
      - '.github/workflows/stage7q-production-auto-approval.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-auto-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run production auto-approval integration tests
        run: >-
          node --test
          tests/stage7q-production-auto-approval.test.mjs
          tests/stage7p-production-device-and-exact-submission.test.mjs
          tests/stage4d-auto-approval.test.mjs
          tests/stage4d-auto-approval-resilience.test.mjs
          tests/stage7n-production-runtime-and-bootstrap.test.mjs

      - name: Audit production safety boundaries
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R "CLOUD_PRODUCTION_.*=1" config/production.env.template
          grep -q "reviewExactPriceCandidate" src/server/production_write_runtime_v1.js
          grep -q "PRODUCTION_CANDIDATE_NOT_FOUND_AFTER_ACCEPT" src/server/production_write_runtime_v1.js
          ! grep -R "stablePromotionAuthorized: true" src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "AUTO_APPROVAL_SECRET\|AUTO_APPROVAL_PASSWORD" src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "Access-Control-Allow-Origin.*\*" src/server/production_write_http_v1.js
          ! grep -R "CLOUD_ADMIN_PASSWORD\|CLOUD_PRODUCTION_CLIENT_ACCESS_KEY=.*[^=]" cloud-functions/api src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js

      - name: Confirm all Cloud Function imports resolve
        run: node --test tests/cloud-functions-relative-imports.test.mjs

name: stage7t-one-time-route-anchors

on:
  push:
    branches:
      - agent/stage7t-production-admin-review
    paths:
      - '.github/workflows/stage7t-one-time-route-anchors.yml'
      - 'scripts/stage7t-add-route-compat-anchors.mjs'

permissions:
  contents: write

jobs:
  patch-route-anchors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage7t-production-admin-review
          fetch-depth: 0
      - run: node scripts/stage7t-add-route-compat-anchors.mjs
      - shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add cloud-functions/api/admin tests/stage7t-production-admin-review.test.mjs
          git commit -m 'fix(stage7t): retain legacy route audit anchors [skip ci]'
          git push origin HEAD:agent/stage7t-production-admin-review

name: stage4d-test-stabilize

on:
  push:
    branches:
      - agent/stage4d-auto-approval-foundation

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[stage4d-test-stabilize]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage4d-auto-approval-foundation
      - name: Stabilize browser receive wait and remove this workflow
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tests/browser_integration.py')
          text = path.read_text(encoding='utf-8')
          old = '}""", timeout=12000)'
          new = '}""", timeout=30000)'
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one receive wait target, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git rm .github/workflows/stage4d-test-stabilize.yml
          git config user.name "stage4d-maintenance"
          git config user.email "stage4d-maintenance@users.noreply.github.com"
          git add tests/browser_integration.py
          git commit -m "测试4D：稳定浏览器只接收同步等待 [stage4d-test-stabilize]"
          git push origin HEAD:agent/stage4d-auto-approval-foundation

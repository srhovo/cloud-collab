name: stage8h-production-bootstrap-hardening

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/run-edgeone-production-bootstrap-v1.mjs'
      - 'tests/stage8g-edgeone-production-bootstrap.test.mjs'
      - '.github/workflows/stage8g-production-bootstrap.yml'
      - '.github/workflows/stage8g-edgeone-production-bootstrap.yml'
      - 'docs/阶段8H_Blob初始化审批环境与执行解锁.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run Stage8H and inherited tests
        shell: bash
        run: |
          set -o pipefail
          node --test \
            tests/stage8g-edgeone-production-bootstrap.test.mjs \
            tests/stage8e-production-handoff.test.mjs \
            tests/stage8d-admin-artifact-isolation.test.mjs \
            tests/stage7n-production-runtime-and-bootstrap.test.mjs \
            2>&1 | tee stage8h-test.log
      - name: Produce zero-write plan
        env:
          BOOTSTRAP_REPORT_PATH: dist/stage8h-bootstrap-plan.json
        run: npm run production:bootstrap:edgeone:plan
      - name: Audit hardening boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -q '"stage": "8H"' dist/stage8h-bootstrap-plan.json
          grep -q '"resourceCount": 10' dist/stage8h-bootstrap-plan.json
          grep -q '"executionBranchRequired": "refs/heads/main"' dist/stage8h-bootstrap-plan.json
          grep -q '"approvalEnvironmentRequired": "production-bootstrap"' dist/stage8h-bootstrap-plan.json
          grep -q '"realBlobWritesPerformed": 0' dist/stage8h-bootstrap-plan.json
          grep -q '"stablePromotionAuthorized": false' dist/stage8h-bootstrap-plan.json
          grep -q "github.ref == 'refs/heads/main'" .github/workflows/stage8g-edgeone-production-bootstrap.yml
          grep -q 'environment: production-bootstrap' .github/workflows/stage8g-edgeone-production-bootstrap.yml
          grep -q 'EDGEONE_BOOTSTRAP_EXECUTION_UNLOCK' .github/workflows/stage8g-edgeone-production-bootstrap.yml
          grep -q 'WRITE-10-IMMUTABLE-OBJECTS' .github/workflows/stage8g-edgeone-production-bootstrap.yml
          ! grep -q '^  push:\|^  pull_request:\|^  schedule:' .github/workflows/stage8g-edgeone-production-bootstrap.yml
      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage8h-production-bootstrap-hardening
          path: |
            dist/stage8h-bootstrap-plan.json
            stage8h-test.log
          if-no-files-found: error
          retention-days: 7

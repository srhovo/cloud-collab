name: stage7w-production-device-governance

on:
  pull_request:
    branches: [main]
    paths:
      - 'config/production.env.template'
      - 'src/server/production_runtime_config_v1.js'
      - 'src/server/production_device_governance_http_v1.js'
      - 'src/server/admin_device_governance_mode_dispatch_v1.js'
      - 'src/server/device_governance_v1.js'
      - 'src/server/device_governance_http_v1.js'
      - 'src/server/production_admin_auth_v1.js'
      - 'src/server/admin_auth_mode_dispatch_v1.js'
      - 'cloud-functions/api/admin/devices**'
      - 'tests/stage7w-production-device-governance.test.mjs'
      - '.github/workflows/stage7w-production-device-governance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-device-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run production and inherited device governance tests
        shell: bash
        run: |
          set -o pipefail
          node --test \
            tests/stage7w-production-device-governance.test.mjs \
            tests/stage5d-device-governance.test.mjs \
            tests/stage7s-production-admin-auth.test.mjs \
            tests/stage7t-production-admin-review.test.mjs \
            tests/stage7n-production-runtime-and-bootstrap.test.mjs \
            2>&1 | tee stage7w-test.log

      - name: Upload Stage7W diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage7w-test-diagnostic
          path: stage7w-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Audit independent device governance gate
        shell: bash
        run: |
          set -euo pipefail
          grep -q "CLOUD_PRODUCTION_DEVICE_GOVERNANCE_ENABLED=0" config/production.env.template
          grep -q "deviceGovernance: readCompatibleFlag" src/server/production_runtime_config_v1.js
          grep -q "flags.adminReview || flags.deviceGovernance" src/server/production_runtime_config_v1.js
          grep -q "runtime.flags.deviceGovernance" src/server/production_device_governance_http_v1.js
          ! grep -q "runtime.flags.adminReview\|runtime.flags.readSync" src/server/production_device_governance_http_v1.js
          grep -q "runtime.publicStoreName" src/server/production_device_governance_http_v1.js
          grep -q "runtime.scope.external" src/server/production_device_governance_http_v1.js
          grep -q "runtime.scope.protocol" src/server/production_device_governance_http_v1.js
          grep -q "CLOUD_ADMIN_DEVICE_REF_SALT" src/server/production_device_governance_http_v1.js
          grep -q "verifyProductionAdminSessionToken" src/server/production_device_governance_http_v1.js
          grep -q "readProductionAdminAuthConfig" src/server/production_device_governance_http_v1.js
          grep -q "resolveAdminAuthMode" src/server/admin_device_governance_mode_dispatch_v1.js
          ! grep -q "verifyAdminSessionToken\|readAdminAuthConfig" src/server/production_device_governance_http_v1.js
          ! grep -q "CLOUD_PRODUCTION_DEVICE_GOVERNANCE_ENABLED" src/server/admin_device_governance_mode_dispatch_v1.js
          ! grep -q "Access-Control-Allow-Origin" src/server/production_device_governance_http_v1.js
          grep -q "stablePromotionAuthorized: false" src/server/production_device_governance_http_v1.js
          ! grep -R "xiaxue76\|2406048740@qq.com" src cloud-functions tests config docs README.md
          ! grep -R "CLOUD_ADMIN_PASSWORD=.*[^=]" config/production.env.template

      - name: Confirm all Cloud Function imports resolve
        run: node --test tests/cloud-functions-relative-imports.test.mjs

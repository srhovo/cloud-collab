name: stage7r-production-playable-boss-auto-approval

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/server/production_ordinary_types_runtime_v1.js'
      - 'src/server/production_write_http_v1.js'
      - 'tests/stage7r-production-playable-boss-auto-approval.test.mjs'
      - '.github/workflows/stage7r-production-playable-boss-auto-approval.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-playable-boss-auto-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Stage7R and inherited ordinary-flow tests
        shell: bash
        run: |
          set -o pipefail
          node --test \
            tests/stage7r-production-playable-boss-auto-approval.test.mjs \
            tests/stage7q-production-auto-approval.test.mjs \
            tests/stage7p-production-device-and-exact-submission.test.mjs \
            tests/stage5g-ordinary-types-policy.test.mjs \
            tests/stage5g-ordinary-acceptance.test.mjs \
            tests/stage5g-ordinary-public-engine.test.mjs \
            tests/stage5g-preview-runtime-integration.test.mjs \
            2>&1 | tee stage7r-test.log

      - name: Upload Stage7R diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage7r-test-diagnostic
          path: stage7r-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Audit mixed ordinary boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -q "acceptProductionExactSubmission" src/server/production_ordinary_types_runtime_v1.js
          grep -q "acceptOrdinaryCandidate" src/server/production_ordinary_types_runtime_v1.js
          grep -q "reviewOrdinaryCandidate" src/server/production_ordinary_types_runtime_v1.js
          grep -q "playable_name.*boss_profile" src/server/production_ordinary_types_runtime_v1.js
          grep -q "acceptProductionOrdinarySubmission" src/server/production_write_http_v1.js
          ! grep -R "Access-Control-Allow-Origin.*\*" src/server/production_write_http_v1.js
          ! grep -R "stablePromotionAuthorized: true" src/server/production_ordinary_types_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "CLOUD_ADMIN_PASSWORD\|CLOUD_PRODUCTION_CLIENT_ACCESS_KEY=.*[^=]" cloud-functions/api src/server/production_ordinary_types_runtime_v1.js src/server/production_write_http_v1.js

      - name: Confirm all Cloud Function imports resolve
        run: node --test tests/cloud-functions-relative-imports.test.mjs

name: stage8a-production-complete-export

on:
  pull_request:
    branches: [main]
    paths:
      - 'config/production.env.template'
      - 'src/server/production_runtime_config_v1.js'
      - 'src/server/production_admin_export_bundle_v1.js'
      - 'src/server/production_admin_export_v1.js'
      - 'src/server/production_admin_export_http_v1.js'
      - 'src/server/admin_export_mode_dispatch_v1.js'
      - 'cloud-functions/api/admin/exports/**'
      - 'tests/stage8a-production-complete-export.test.mjs'
      - '.github/workflows/stage8a-production-complete-export.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-complete-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run production and inherited export tests
        shell: bash
        run: |
          set -o pipefail
          node --test \
            tests/stage8a-production-complete-export.test.mjs \
            tests/stage5f-admin-export.test.mjs \
            tests/stage7s-production-admin-auth.test.mjs \
            tests/stage7t-production-admin-review.test.mjs \
            tests/stage7n-production-runtime-and-bootstrap.test.mjs \
            2>&1 | tee stage8a-test.log

      - name: Upload Stage8A diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage8a-test-diagnostic
          path: stage8a-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Audit complete export boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -q "CLOUD_PRODUCTION_EXPORT_ENABLED=0" config/production.env.template
          grep -q "export: readCompatibleFlag" src/server/production_runtime_config_v1.js
          grep -q "flags.export" src/server/production_runtime_config_v1.js
          grep -q "runtime.flags.export" src/server/production_admin_export_http_v1.js
          grep -q "verifyProductionAdminSessionToken" src/server/production_admin_export_http_v1.js
          grep -q "runtime.publicStoreName" src/server/production_admin_export_http_v1.js
          grep -q "CLOUD_ADMIN_EXPORT_AUDIT_SALT" src/server/production_admin_export_http_v1.js
          grep -q "buildUnifiedSensitivePublicSnapshot" src/server/production_admin_export_bundle_v1.js
          for type in exact_price playable_name boss_profile rank_range_rule surcharge_rule gift_rule; do
            grep -q "$type" src/server/production_admin_export_bundle_v1.js
          done
          grep -q "tombstones/index.json" src/server/production_admin_export_bundle_v1.js
          grep -q "ordinary-public-events.json" src/server/production_admin_export_bundle_v1.js
          grep -q "sensitive-public-events.json" src/server/production_admin_export_bundle_v1.js
          grep -q "PRODUCTION_EXPORT_REQUEST_STALE" src/server/production_admin_export_v1.js
          grep -q "resolveAdminAuthMode" src/server/admin_export_mode_dispatch_v1.js
          ! grep -q "verifyAdminSessionToken\|readAdminAuthConfig" src/server/production_admin_export_http_v1.js
          ! grep -q "CLOUD_PRODUCTION_EXPORT_ENABLED" src/server/admin_export_mode_dispatch_v1.js
          ! grep -R "xiaxue76\|2406048740@qq.com" src cloud-functions tests config docs README.md
          ! grep -R "CLOUD_ADMIN_PASSWORD=.*[^=]" config/production.env.template

      - name: Confirm all Cloud Function imports resolve
        run: node --test tests/cloud-functions-relative-imports.test.mjs

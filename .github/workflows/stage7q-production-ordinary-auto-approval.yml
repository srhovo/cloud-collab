name: stage7q-production-ordinary-auto-approval

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/server/production_ordinary_runtime_v1.js'
      - 'src/server/production_write_http_v1.js'
      - 'src/server/production_write_runtime_v1.js'
      - 'src/server/ordinary_types_policy_v1.js'
      - 'src/server/ordinary_submission_acceptance_v1.js'
      - 'src/server/ordinary_public_engine_v1.js'
      - 'tests/stage7q-production-ordinary-auto-approval.test.mjs'
      - '.github/workflows/stage7q-production-ordinary-auto-approval.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-ordinary-auto-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Stage7Q and inherited ordinary-flow tests
        shell: bash
        run: |
          set -o pipefail
          node --test \
            tests/stage7q-production-ordinary-auto-approval.test.mjs \
            tests/stage7p-production-device-and-exact-submission.test.mjs \
            tests/stage5g-ordinary-types-policy.test.mjs \
            tests/stage5g-ordinary-acceptance.test.mjs \
            tests/stage5g-ordinary-public-engine.test.mjs \
            tests/stage5g-preview-runtime-integration.test.mjs \
            tests/stage7n-production-runtime-and-bootstrap.test.mjs \
            2>&1 | tee stage7q-test.log

      - name: Upload Stage7Q test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage7q-test-diagnostic
          path: stage7q-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Audit production ordinary defaults and route boundary
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R "CLOUD_PRODUCTION_.*=1" config/production.env.template
          grep -q "CLOUD_PRODUCTION_AUTO_APPROVAL_HANDLER_ENABLED=0" config/production.env.template
          grep -q "acceptProductionOrdinarySubmission" src/server/production_write_http_v1.js
          grep -q "reviewOrdinaryCandidate" src/server/production_ordinary_runtime_v1.js
          grep -q "normalizeOrdinarySubmission" src/server/production_ordinary_runtime_v1.js
          grep -q "PRODUCTION_AUTO_APPROVAL_HANDLER_REQUIRED" src/server/production_write_http_v1.js
          ! grep -R "Access-Control-Allow-Origin.*\*" src/server/production_write_http_v1.js
          ! grep -R "stablePromotionAuthorized: true" src/server/production_ordinary_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "publicMutationAllowed: true" src/server/production_ordinary_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "CLOUD_ADMIN_PASSWORD\|CLOUD_PRODUCTION_CLIENT_ACCESS_KEY=.*[^=]" cloud-functions/api src/server/production_ordinary_runtime_v1.js src/server/production_write_http_v1.js

      - name: Confirm all Cloud Function imports resolve
        run: node --test tests/cloud-functions-relative-imports.test.mjs

name: stage8e-production-handoff

on:
  pull_request:
    branches: [main]
    paths:
      - 'release/production-handoff-plan-v1.json'
      - 'tools/production-secret-generator*'
      - 'scripts/build-production-handoff-v1.mjs'
      - 'tests/stage8e-production-handoff.test.mjs'
      - 'tests/stage8e_browser_production_secret_generator.py'
      - 'config/production.env.template'
      - 'package.json'
      - '.github/workflows/stage8e-production-handoff.yml'
      - 'docs/阶段8E_生产部署交接包与离线配置生成器.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-handoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build frozen public candidate source
        run: npm run build
      - name: Run Stage8E and inherited boundary tests
        shell: bash
        run: |
          set -o pipefail
          node --test \
            tests/stage8e-production-handoff.test.mjs \
            tests/stage8d-admin-artifact-isolation.test.mjs \
            tests/stage8d-no-deploy-audit.test.mjs \
            tests/stage8c-production-admin-console.test.mjs \
            tests/stage8b-export-consistency-hardening.test.mjs \
            tests/stage8a-production-complete-export.test.mjs \
            tests/stage7n-production-runtime-and-bootstrap.test.mjs \
            tests/stage7l-production-readiness.test.mjs \
            2>&1 | tee stage8e-test.log
      - name: Build public, administrator and handoff artifacts
        shell: bash
        run: |
          npm run public:prepare -- --channel edgeone-primary --output .edgeone-artifact --commit "$GITHUB_SHA"
          npm run admin:prepare -- --output .edgeone-admin-artifact --commit "$GITHUB_SHA"
          npm run admin:verify:isolation | tee stage8e-isolation.json
          npm run production:handoff
      - name: Install browser runtime
        run: |
          python3 -m pip install --disable-pip-version-check playwright
          python3 -m playwright install --with-deps chromium
          CHROMIUM_PATH="$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)"
          test -n "$CHROMIUM_PATH"
          sudo ln -sf "$CHROMIUM_PATH" /usr/bin/chromium
      - name: Run offline generator browser regression
        run: python3 tests/stage8e_browser_production_secret_generator.py 2>&1 | tee stage8e-browser.log
      - name: Audit handoff boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -q "connect-src 'none'" tools/production-secret-generator.html
          grep -q "crypto.getRandomValues" tools/production-secret-generator.js
          grep -q "pagehide" tools/production-secret-generator.js
          ! grep -R "fetch\|XMLHttpRequest\|WebSocket\|EventSource\|sendBeacon\|navigator.clipboard\|localStorage\|sessionStorage\|indexedDB\|document.cookie" tools/production-secret-generator*
          grep -q '"deploymentPerformed": true' dist/production-handoff-v1.json
          grep -q '"administratorConsoleDeployed": true' dist/production-handoff-v1.json
          grep -q '"environmentVariablesWritten": false' dist/production-handoff-v1.json
          grep -q '"realPrivateValuesGenerated": false' dist/production-handoff-v1.json
          grep -q '"realBlobOperationsPerformed": 0' dist/production-handoff-v1.json
          grep -q '"productionActivationPerformed": false' dist/production-handoff-v1.json
          grep -q '"stablePromotionAuthorized": false' dist/production-handoff-v1.json
          ! grep -R "eo_token=" dist/production-handoff-v1.json dist/production-owner-actions-v1.md dist/production-edgeone-env-template-v1.txt
          ! grep -R "CLOUD_PRODUCTION_ENABLED=1" dist/production-edgeone-env-template-v1.txt tools/production-secret-generator.html
          test "$(find .edgeone-artifact -maxdepth 1 -type f | wc -l)" -eq 3
          test "$(find .edgeone-admin-artifact -maxdepth 1 -type f | wc -l)" -eq 4
          ! grep -q "production-secret-generator" scripts/prepare-public-candidate-v1.mjs
          ! grep -q "production-secret-generator" scripts/prepare-admin-console-v1.mjs
      - name: Confirm Cloud Function imports
        run: node --test tests/cloud-functions-relative-imports.test.mjs
      - name: Upload Stage8E handoff package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage8e-production-handoff
          path: |
            dist/production-handoff-v1.json
            dist/production-owner-actions-v1.md
            dist/production-edgeone-env-template-v1.txt
            tools/production-secret-generator.html
            tools/production-secret-generator.css
            tools/production-secret-generator.js
            stage8e-test.log
            stage8e-browser.log
            stage8e-isolation.json
          if-no-files-found: error
          retention-days: 14

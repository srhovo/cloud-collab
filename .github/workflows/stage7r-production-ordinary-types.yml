name: stage7r-production-ordinary-types

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/server/production_write_runtime_v1.js'
      - 'src/server/production_write_http_v1.js'
      - 'src/server/ordinary_types_policy_v1.js'
      - 'src/server/ordinary_submission_acceptance_v1.js'
      - 'src/server/ordinary_public_engine_v1.js'
      - 'tests/stage7r-production-ordinary-types.test.mjs'
      - '.github/workflows/stage7r-production-ordinary-types.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-ordinary-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run production ordinary-type integration tests
        run: >-
          node --test
          tests/stage7r-production-ordinary-types.test.mjs
          tests/stage7q-production-auto-approval.test.mjs
          tests/stage7p-production-device-and-exact-submission.test.mjs
          tests/stage5g-ordinary-types-policy.test.mjs
          tests/stage5g-ordinary-acceptance.test.mjs
          tests/stage5g-ordinary-public-engine.test.mjs
          tests/stage5g-preview-runtime-integration.test.mjs
          tests/stage7n-production-runtime-and-bootstrap.test.mjs

      - name: Audit production ordinary-type boundaries
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R "CLOUD_PRODUCTION_.*=1" config/production.env.template
          grep -q "acceptOrdinarySubmission" src/server/production_write_runtime_v1.js
          grep -q "reviewOrdinaryCandidate" src/server/production_write_runtime_v1.js
          grep -q "acceptProductionSubmission" src/server/production_write_http_v1.js
          grep -q "playable_name" src/server/production_write_runtime_v1.js
          grep -q "boss_profile" src/server/production_write_runtime_v1.js
          ! grep -R "sensitive_submission_acceptance\|reviewSensitiveCandidate" src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "stablePromotionAuthorized: true" src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "ORDINARY_TYPES_SECRET\|BOSS_PROFILE_SECRET" src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "Access-Control-Allow-Origin.*\*" src/server/production_write_http_v1.js
          ! grep -R "CLOUD_ADMIN_PASSWORD\|CLOUD_PRODUCTION_CLIENT_ACCESS_KEY=.*[^=]" cloud-functions/api src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js

      - name: Confirm all Cloud Function imports resolve
        run: node --test tests/cloud-functions-relative-imports.test.mjs

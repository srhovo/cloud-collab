name: stage7q-production-ordinary-types

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/server/production_write_runtime_v1.js'
      - 'src/server/production_write_http_v1.js'
      - 'tests/stage7q-production-ordinary-types.test.mjs'
      - '.github/workflows/stage7q-production-ordinary-types.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-ordinary-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run production ordinary type tests
        run: node --test tests/stage7q-production-ordinary-types.test.mjs tests/stage7p-production-device-and-exact-submission.test.mjs tests/stage5g-ordinary-acceptance.test.mjs tests/stage5g-ordinary-types-policy.test.mjs

      - name: Audit candidate-only boundary
        shell: bash
        run: |
          set -euo pipefail
          grep -q "playable_name" src/server/production_write_runtime_v1.js
          grep -q "boss_profile" src/server/production_write_runtime_v1.js
          grep -q "PRODUCTION_SENSITIVE_HANDLER_REQUIRED" src/server/production_write_runtime_v1.js
          grep -q "PRODUCTION_AUTO_APPROVAL_HANDLER_REQUIRED" src/server/production_write_http_v1.js
          ! grep -R "stablePromotionAuthorized: true" src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "publicMutationAllowed: true" src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "autoApprovalEnabled: true" src/server/production_write_runtime_v1.js src/server/production_write_http_v1.js
          ! grep -R "Access-Control-Allow-Origin.*\*" src/server/production_write_http_v1.js

name: stage7j-draft-candidate

on:
  pull_request:
    paths:
      - '.github/workflows/stage7j-draft-candidate.yml'
      - 'edgeone.json'
      - 'scripts/build-stage6b-compatible.mjs'
      - 'scripts/release-readiness-audit-v1.mjs'
      - 'scripts/package-release-candidate-v1.mjs'
      - 'release/release-closure-ledger-v1.json'
      - 'tests/stage7j-candidate-ui-charset.test.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  draft-candidate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout draft candidate
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build 8.2.31 candidate
        run: npm run build

      - name: Verify Stage7J UI and charset contract
        run: node --test tests/stage7j-candidate-ui-charset.test.mjs

      - name: Verify release audit boundary
        run: npm run release:audit

      - name: Package draft candidate
        run: npm run release:package

      - name: Print candidate identity
        shell: bash
        run: |
          set -euo pipefail
          test -f 'release-output/码单器8.2.31_候选.html'
          test -f 'release-output/最终发布清单_8.2.31.json'
          test -f 'release-output/发布审计_8.2.31.json'
          sha256sum 'release-output/码单器8.2.31_候选.html'
          wc -c 'release-output/码单器8.2.31_候选.html'
          cat 'release-output/最终发布清单_8.2.31.json'

      - name: Upload draft 8.2.31 candidate package
        uses: actions/upload-artifact@v4
        with:
          name: mdq-8.2.31-draft-candidate-package
          path: |
            release-output/码单器8.2.31_候选.html
            release-output/最终发布清单_8.2.31.json
            release-output/发布审计_8.2.31.json
            dist/build-manifest.json
          if-no-files-found: error
          retention-days: 30

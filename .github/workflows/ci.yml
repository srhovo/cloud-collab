name: stage4c-client-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run ci
      - name: Install browser test runtime
        run: |
          python3 -m pip install --disable-pip-version-check playwright
          python3 -m playwright install --with-deps chromium
          CHROMIUM_PATH="$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)"
          test -n "$CHROMIUM_PATH"
          sudo ln -sf "$CHROMIUM_PATH" /usr/bin/chromium
      - run: python3 tests/core_compare.py
      - run: python3 tests/browser_integration.py

  stage4d-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Stress stage4D resilience tests
        id: resilience
        shell: bash
        run: |
          set +e
          : > stage4d-resilience.log
          code=0
          for run in $(seq 1 40); do
            echo "===== resilience run ${run}/40 =====" >> stage4d-resilience.log
            node --test tests/stage4d-auto-approval-resilience.test.mjs >> stage4d-resilience.log 2>&1
            code=$?
            if [ "$code" -ne 0 ]; then
              break
            fi
          done
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage4d-resilience-log
          path: stage4d-resilience.log
          if-no-files-found: error
      - name: Enforce stage4D resilience result
        run: |
          tail -n 160 stage4d-resilience.log
          test "${{ steps.resilience.outputs.exit_code }}" = "0"

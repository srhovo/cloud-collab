name: stage4c-client-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run ci
      - name: Upload CI results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage4c-ci-results-${{ github.run_id }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 7

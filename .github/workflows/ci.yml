name: stage4c-client-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Run npm install --ignore-scripts
        run: npm install --ignore-scripts
      - name: Run npm run ci and verify Node summary
        shell: bash
        run: |
          set +e
          npm run ci > ci.log 2>&1
          command_status=$?
          summary_status=0
          node scripts/verify-node-test-summary-v1.mjs ci.log >> ci.log 2>&1 || summary_status=$?
          status=$command_status
          if [ "$status" -eq 0 ] && [ "$summary_status" -ne 0 ]; then
            status=$summary_status
          fi
          if [ "$status" -eq 0 ]; then
            tail -n 100 ci.log
          else
            echo "npm run ci or its Node summary audit failed; showing the final 260 log lines."
            echo "command_status=$command_status summary_status=$summary_status"
            tail -n 260 ci.log
          fi
          exit "$status"
      - name: Upload CI command log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-command-log
          path: ci.log
          if-no-files-found: error
          retention-days: 7
      - name: Install browser test runtime
        run: |
          python3 -m pip install --disable-pip-version-check playwright
          python3 -m playwright install --with-deps chromium
          CHROMIUM_PATH="$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)"
          test -n "$CHROMIUM_PATH"
          sudo ln -sf "$CHROMIUM_PATH" /usr/bin/chromium
      - run: python3 tests/core_compare.py
      - run: python3 tests/browser_integration.py
      - name: Stage5A admin authentication browser regression
        run: python3 tests/stage5a_browser_admin_auth.py
      - name: Stage5B admin read-only review browser regression
        run: python3 tests/stage5b_browser_admin_reviews.py
      - name: Stage5C admin review mutation browser regression
        run: python3 tests/stage5c_browser_admin_review_mutations.py
      - name: Stage5D admin device governance browser regression
        run: python3 tests/stage5d_browser_device_governance.py
      - name: Stage5E admin rollback browser regression
        run: python3 tests/stage5e_browser_admin_rollback.py
      - name: Stage5F administrator export browser regression
        run: python3 tests/stage5f_browser_admin_export.py
      - name: Stage5G ordinary administrator review browser regression
        run: python3 tests/stage5g_browser_admin_ordinary_reviews.py
      - name: Stage5G ordinary user candidate browser regression
        id: stage5g_browser
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          python3 tests/stage5g_browser_ordinary_client.py 2>&1 | tee test-results/stage5g-browser.log
      - name: Upload Stage5G browser diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage5g-browser-diagnostic
          path: test-results/stage5g-browser.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail on Stage5G browser regression
        if: steps.stage5g_browser.outcome == 'failure'
        run: exit 1
      - name: Stage6B sensitive user queue and tombstone browser regression
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          python3 tests/stage6b_browser_sensitive_client.py 2>&1 | tee test-results/stage6b-user-browser.log
      - name: Stage6B sensitive administrator review browser regression
        id: stage6b_admin_browser
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          python3 tests/stage6b_browser_admin_sensitive_reviews.py 2>&1 | tee test-results/stage6b-admin-browser.log
      - name: Upload Stage6B administrator browser diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage6b-admin-browser-diagnostic
          path: |
            test-results/stage6b-admin-browser.log
            test-results/阶段6B_管理员敏感审核浏览器回归.png
          if-no-files-found: warn
          retention-days: 7
      - name: Fail on Stage6B administrator browser regression
        if: steps.stage6b_admin_browser.outcome == 'failure'
        run: exit 1
      - name: Upload browser regression logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-regression-logs
          path: test-results/*browser*.log
          if-no-files-found: warn
          retention-days: 7

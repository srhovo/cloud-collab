name: stage4c-client-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - name: Run complete CI
        id: complete-ci
        shell: bash
        run: |
          set +e
          npm run ci 2>&1 | tee ci-output.log
          status=${PIPESTATUS[0]}
          echo "$status" > ci-exit-code.txt
          exit "$status"
      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage4c-ci-diagnostics
          path: |
            ci-output.log
            ci-exit-code.txt
            test-results/
          if-no-files-found: warn
          retention-days: 7

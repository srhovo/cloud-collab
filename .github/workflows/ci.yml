name: stage4c-client-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  stage4e-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - name: 4E config gates
        run: node --test --test-name-pattern="double-gated" tests/stage4e-preview-auto-approval-routing.test.mjs
      - name: 4E new price approval
        run: node --test --test-name-pattern="two devices approve" tests/stage4e-preview-auto-approval-routing.test.mjs
      - name: 4E update and review
        run: node --test --test-name-pattern="safe update" tests/stage4e-preview-auto-approval-routing.test.mjs
      - name: 4E dynamic HTTP reads
        run: node --test --test-name-pattern="preview HTTP reads" tests/stage4e-preview-auto-approval-routing.test.mjs
      - name: 4E access gates
        run: node --test --test-name-pattern="fail before Blob" tests/stage4e-preview-auto-approval-routing.test.mjs
      - name: 4E submission flags
        run: node --test --test-name-pattern="formal capabilities" tests/stage4e-preview-auto-approval-routing.test.mjs
      - name: 4E route isolation
        run: node --test --test-name-pattern="without replacing" tests/stage4e-preview-auto-approval-routing.test.mjs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run ci
      - name: Install browser test runtime
        run: |
          python3 -m pip install --disable-pip-version-check playwright
          python3 -m playwright install --with-deps chromium
          CHROMIUM_PATH="$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)"
          test -n "$CHROMIUM_PATH"
          sudo ln -sf "$CHROMIUM_PATH" /usr/bin/chromium
      - run: python3 tests/core_compare.py
      - run: python3 tests/browser_integration.py

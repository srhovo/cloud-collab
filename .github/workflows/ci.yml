name: stage4c-client-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Run npm install --ignore-scripts
        run: npm install --ignore-scripts
      - name: Run npm run ci
        shell: bash
        run: |
          set -o pipefail
          npm run ci 2>&1 | tee ci.log
      - name: Upload CI command log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-command-log
          path: ci.log
          if-no-files-found: error
          retention-days: 7
      - name: Install browser test runtime
        run: |
          python3 -m pip install --disable-pip-version-check playwright
          python3 -m playwright install --with-deps chromium
          CHROMIUM_PATH="$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)"
          test -n "$CHROMIUM_PATH"
          sudo ln -sf "$CHROMIUM_PATH" /usr/bin/chromium
      - run: python3 tests/core_compare.py
      - run: python3 tests/browser_integration.py
      - name: Stage5A admin authentication browser regression
        run: python3 tests/stage5a_browser_admin_auth.py
      - name: Stage5B admin read-only review browser regression
        run: python3 tests/stage5b_browser_admin_reviews.py
      - name: Stage5C admin review mutation browser regression
        run: python3 tests/stage5c_browser_admin_review_mutations.py
      - name: Stage5D admin device governance browser regression
        run: python3 tests/stage5d_browser_device_governance.py
      - name: Stage5E admin rollback browser regression
        run: python3 tests/stage5e_browser_admin_rollback.py
      - name: Stage5F administrator export browser regression
        run: python3 tests/stage5f_browser_admin_export.py

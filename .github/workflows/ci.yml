name: stage4d-browser-diagnostic

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run ci
      - name: Install browser test runtime
        run: |
          python3 -m pip install --disable-pip-version-check playwright
          python3 -m playwright install --with-deps chromium
          CHROMIUM_PATH="$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)"
          test -n "$CHROMIUM_PATH"
          sudo ln -sf "$CHROMIUM_PATH" /usr/bin/chromium
      - run: python3 tests/core_compare.py
      - name: Capture two browser integration runs
        id: browser
        shell: bash
        run: |
          set +e
          : > browser-integration.log
          code=0
          for run in 1 2; do
            echo "===== browser run ${run}/2 =====" >> browser-integration.log
            python3 tests/browser_integration.py >> browser-integration.log 2>&1
            code=$?
            echo "run_${run}_exit=${code}" >> browser-exit-codes.txt
            if [ "$code" -ne 0 ]; then
              break
            fi
          done
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage4d-browser-diagnostic
          path: |
            browser-integration.log
            browser-exit-codes.txt
          if-no-files-found: error
      - name: Enforce browser result
        run: |
          cat browser-exit-codes.txt
          tail -n 240 browser-integration.log
          test "${{ steps.browser.outputs.exit_code }}" = "0"

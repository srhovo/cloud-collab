name: stage4c-preview-harness-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - name: Build 8.2.28 candidate
        run: npm run build
      - name: Validate preview client harness
        run: node --test tests/stage4c-preview-harness.test.mjs
      - name: Validate cleanup runtime
        run: node --test tests/stage4c-preview-cleanup.test.mjs
      - name: Validate cleanup object limit
        run: node --test tests/stage4c-preview-cleanup-limit.test.mjs
      - name: Validate cleanup operator page
        run: node --test tests/stage4c-preview-cleanup-operator.test.mjs
      - name: Run canonical project CI
        run: npm run ci
      - name: Install browser test runtime
        run: |
          python3 -m pip install --disable-pip-version-check playwright
          python3 -m playwright install --with-deps chromium
          CHROMIUM_PATH="$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)"
          test -n "$CHROMIUM_PATH"
          sudo ln -sf "$CHROMIUM_PATH" /usr/bin/chromium
      - run: python3 tests/core_compare.py
      - run: python3 tests/browser_integration.py

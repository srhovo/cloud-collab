name: stage7v-production-sensitive-review

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/server/production_admin_sensitive_review_http_v1.js'
      - 'src/server/admin_sensitive_review_mode_dispatch_v1.js'
      - 'src/server/admin_sensitive_review_v1.js'
      - 'src/server/sensitive_public_engine_v1.js'
      - 'src/server/production_admin_auth_v1.js'
      - 'src/server/admin_auth_mode_dispatch_v1.js'
      - 'cloud-functions/api/admin/sensitive-reviews**'
      - 'tests/stage7v-production-sensitive-review.test.mjs'
      - '.github/workflows/stage7v-production-sensitive-review.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-sensitive-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run production and inherited sensitive review tests
        shell: bash
        run: |
          set -o pipefail
          node --test \
            tests/stage7v-production-sensitive-review.test.mjs \
            tests/stage6b-admin-sensitive-review.test.mjs \
            tests/stage7s-production-sensitive-intake.test.mjs \
            tests/stage7s-production-admin-auth.test.mjs \
            tests/stage7t-production-admin-review.test.mjs \
            tests/stage7n-production-runtime-and-bootstrap.test.mjs \
            2>&1 | tee stage7v-test.log

      - name: Upload Stage7V diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage7v-test-diagnostic
          path: stage7v-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Audit production sensitive review boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -q "runtime.publicStoreName" src/server/production_admin_sensitive_review_http_v1.js
          grep -q "runtime.scope.protocol.groupId" src/server/production_admin_sensitive_review_http_v1.js
          grep -q "runtime.scope.protocol.libraryId" src/server/production_admin_sensitive_review_http_v1.js
          grep -q "verifyProductionAdminSessionToken" src/server/production_admin_sensitive_review_http_v1.js
          grep -q "mutateAdminSensitiveReview" src/server/production_admin_sensitive_review_http_v1.js
          grep -q "resolveAdminAuthMode" src/server/admin_sensitive_review_mode_dispatch_v1.js
          ! grep -q "verifyAdminSessionToken\|readAdminAuthConfig" src/server/production_admin_sensitive_review_http_v1.js
          ! grep -q "CLOUD_ADMIN_PRODUCTION_ENABLED\|CLOUD_PRODUCTION_SENSITIVE_SUBMISSION_ENABLED" src/server/admin_sensitive_review_mode_dispatch_v1.js
          grep -q "automaticApproval: false" src/server/production_admin_sensitive_review_http_v1.js
          grep -q "stablePromotionAuthorized: false" src/server/production_admin_sensitive_review_http_v1.js
          ! grep -R "Access-Control-Allow-Origin.*\*" src/server/production_admin_sensitive_review_http_v1.js
          ! grep -R "CLOUD_ADMIN_PASSWORD=.*[^=]" config/production.env.template

      - name: Confirm all Cloud Function imports resolve
        run: node --test tests/cloud-functions-relative-imports.test.mjs

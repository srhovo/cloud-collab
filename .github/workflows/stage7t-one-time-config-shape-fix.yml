name: stage7t-one-time-config-shape-fix

on:
  push:
    branches:
      - agent/stage7t-production-admin-review
    paths:
      - '.github/workflows/stage7t-one-time-config-shape-fix.yml'
      - 'scripts/stage7t-fix-runtime-config-shape.mjs'

permissions:
  contents: write

jobs:
  patch-config-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage7t-production-admin-review
          fetch-depth: 0
      - run: node scripts/stage7t-fix-runtime-config-shape.mjs
      - shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- src/server/production_admin_review_http_v1.js; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/server/production_admin_review_http_v1.js
          git commit -m 'fix(stage7t): match production runtime config shape [skip ci]'
          git push origin HEAD:agent/stage7t-production-admin-review

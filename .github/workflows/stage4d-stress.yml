name: stage4d-stress

on:
  push:
    branches:
      - agent/stage4d-auto-approval-foundation

permissions:
  contents: read

jobs:
  stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run concurrency resilience 100 times
        id: stress
        shell: bash
        run: |
          set +e
          : > stage4d-stress.log
          code=0
          for i in $(seq 1 100); do
            echo "===== iteration $i =====" >> stage4d-stress.log
            node --test tests/stage4d-auto-approval-resilience.test.mjs >> stage4d-stress.log 2>&1
            code=$?
            if [ "$code" -ne 0 ]; then
              break
            fi
          done
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage4d-stress-log
          path: stage4d-stress.log
          if-no-files-found: error
      - name: Enforce stress result
        run: test "${{ steps.stress.outputs.exit_code }}" = "0"

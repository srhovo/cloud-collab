<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; connect-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none'">
  <title>阶段5DEF联合验收清理</title>
  <style>
    :root{font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;color-scheme:light;--blue:#0969da;--red:#cf222e;--green:#1a7f37;--amber:#9a6700;--border:#d0d7de;--bg:#f6f8fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#1f2328}main{width:min(760px,calc(100% - 24px));margin:18px auto 50px}.card{padding:18px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 8px 24px rgba(31,35,40,.06)}h1{margin:0 0 10px;font-size:24px}.banner{padding:11px 13px;border-left:4px solid var(--red);border-radius:8px;background:#ffebe9;line-height:1.55}label{display:block;margin:12px 0 6px;font-weight:750}input{width:100%;min-height:44px;border:1px solid #8c959f;border-radius:8px;padding:9px;font:16px system-ui}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px}button{min-height:42px;border:0;border-radius:8px;padding:9px 14px;background:var(--blue);color:#fff;font:750 15px system-ui;cursor:pointer}button.danger{background:var(--red)}button.secondary{background:#656d76}button:disabled{opacity:.45}.status{margin-top:13px;padding:12px;border:1px solid var(--border);border-radius:9px;background:var(--bg);font-weight:700;white-space:pre-wrap;line-height:1.55}.ok{color:var(--green)}.error{color:var(--red)}@media(max-width:560px){.actions button{width:100%}}
  </style>
</head>
<body>
<main><section class="card">
  <h1>阶段5D + 5E + 5F 联合验收清理</h1>
  <p class="banner"><strong>危险操作。</strong>此页面只能在全部管理员能力关闭、联合验收关闭、清理开关开启的新部署上使用。必须先检查对象摘要，再执行删除，并连续复查两次均为0。</p>
  <label for="cleanupKey">联合清理密钥</label>
  <input id="cleanupKey" type="password" autocomplete="off" spellcheck="false">
  <div class="actions">
    <button id="inspectBtn" type="button">强一致检查两套Blob</button>
    <button id="executeBtn" class="danger" type="button" disabled>按检查摘要执行删除</button>
    <button id="verifyBtn" class="secondary" type="button">再次强一致复查</button>
    <button id="clearBtn" class="secondary" type="button">清除页面内存状态</button>
  </div>
  <div id="status" class="status" aria-live="polite">尚未检查。</div>
</section></main>
<script>
(() => {
  'use strict';
  const $=id=>document.getElementById(id);const els={cleanupKey:$('cleanupKey'),inspectBtn:$('inspectBtn'),executeBtn:$('executeBtn'),verifyBtn:$('verifyBtn'),clearBtn:$('clearBtn'),status:$('status')};
  const state={busy:false,publicDigest:null,adminDigest:null,verifyCount:0};
  function setStatus(message,kind=''){els.status.textContent=message;els.status.className=`status ${kind}`.trim();}
  function apiUrl(path){const url=new URL(path,location.origin);const current=new URL(location.href);for(const name of ['eo_token','eo_time']){const value=current.searchParams.get(name);if(value)url.searchParams.set(name,value);}return url;}
  async function request(body){let response;try{response=await fetch(apiUrl('/api/stage5def/cleanup'),{method:'POST',credentials:'same-origin',cache:'no-store',redirect:'error',referrerPolicy:'no-referrer',headers:{'Content-Type':'application/json','x-cloud-stage5def-cleanup-key':String(els.cleanupKey.value||'')},body:JSON.stringify(body)});}catch(_){const error=new Error('无法连接联合清理接口');error.code='NETWORK_ERROR';throw error;}const payload=await response.json().catch(()=>null);if(!response.ok||!payload?.ok){const error=new Error(payload?.error?.message||`HTTP ${response.status}`);error.code=payload?.error?.code||`HTTP_${response.status}`;throw error;}return payload.data.result;}
  async function inspect(){setStatus('正在强一致检查公共与管理员两套Blob……');const result=await request({schemaVersion:1,action:'inspect',confirmation:'DELETE_STAGE5DEF_SYNTHETIC_PREVIEW_V1'});state.publicDigest=result.publicKeySetDigest;state.adminDigest=result.adminKeySetDigest;state.verifyCount=0;els.executeBtn.disabled=false;setStatus(`检查完成\n公共对象：${result.publicObjectCount}\n管理员对象：${result.adminObjectCount}\n总对象：${result.totalObjectCount}\n公共摘要：${result.publicKeySetDigest}\n管理员摘要：${result.adminKeySetDigest}`,'ok');}
  async function execute(){if(!state.publicDigest||!state.adminDigest)throw Object.assign(new Error('必须先完成强一致检查'),{code:'INSPECT_REQUIRED'});if(!confirm('确认按刚刚检查的两套Blob摘要删除全部阶段5DEF合成验收对象？'))return;setStatus('正在按固定白名单删除并强一致复查……');const result=await request({schemaVersion:1,action:'execute',confirmation:'DELETE_STAGE5DEF_SYNTHETIC_PREVIEW_V1',expectedPublicKeySetDigest:state.publicDigest,expectedAdminKeySetDigest:state.adminDigest});state.publicDigest=null;state.adminDigest=null;state.verifyCount=0;els.executeBtn.disabled=true;setStatus(`删除完成\n公共删除：${result.publicDeletedCount}\n管理员删除：${result.adminDeletedCount}\n强一致剩余：${result.publicRemainingCount+result.adminRemainingCount}\n接下来请连续点击“再次强一致复查”两次。`,'ok');}
  async function verify(){setStatus('正在执行独立强一致复查……');const result=await request({schemaVersion:1,action:'inspect',confirmation:'DELETE_STAGE5DEF_SYNTHETIC_PREVIEW_V1'});if(result.publicObjectCount!==0||result.adminObjectCount!==0)throw Object.assign(new Error(`仍有对象：公共${result.publicObjectCount}，管理员${result.adminObjectCount}`),{code:'CLEANUP_REMAINING_OBJECTS'});state.verifyCount+=1;setStatus(`第${state.verifyCount}次独立强一致复查通过\n公共对象：0\n管理员对象：0${state.verifyCount>=2?'\n\n两次复查均为0。现在关闭清理开关，删除全部临时变量、部署和EdgeOne项目。':''}`,'ok');}
  function clear(){els.cleanupKey.value='';state.publicDigest=null;state.adminDigest=null;state.verifyCount=0;els.executeBtn.disabled=true;setStatus('已清除页面内存状态。','ok');}
  async function guard(task){if(state.busy)return;state.busy=true;try{await task();}catch(error){setStatus(`错误码：${error.code||'ERROR'}\n${error.message||'清理失败'}`,'error');}finally{state.busy=false;}}
  els.inspectBtn.addEventListener('click',()=>guard(inspect));els.executeBtn.addEventListener('click',()=>guard(execute));els.verifyBtn.addEventListener('click',()=>guard(verify));els.clearBtn.addEventListener('click',clear);window.addEventListener('pagehide',()=>{els.cleanupKey.value='';});
})();
</script>
</body>
</html>

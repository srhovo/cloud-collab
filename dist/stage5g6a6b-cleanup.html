<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; connect-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none'">
  <title>阶段5G+6A+6B联合验收清理</title>
  <style>
    :root{font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;color-scheme:light;--blue:#0969da;--green:#1a7f37;--red:#cf222e;--border:#d0d7de;--muted:#57606a;--bg:#f6f8fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#1f2328}main{width:min(760px,calc(100% - 24px));margin:18px auto 48px}.card{padding:18px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 8px 24px rgba(31,35,40,.06)}h1{margin:0 0 10px;font-size:24px}.banner{padding:12px;border-left:4px solid var(--red);border-radius:8px;background:#ffebe9;line-height:1.55}label{display:block;margin:12px 0 6px;font-weight:750}input{width:100%;min-height:44px;border:1px solid #8c959f;border-radius:8px;padding:9px;font:16px system-ui}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px}button{min-height:42px;border:0;border-radius:8px;padding:9px 14px;background:var(--blue);color:#fff;font:750 14px system-ui;cursor:pointer}button.danger{background:var(--red)}button.secondary{background:#656d76}button:disabled{opacity:.45}.status{margin-top:12px;padding:12px;border:1px solid var(--border);border-radius:9px;background:var(--bg);font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;line-height:1.55}.ok{color:var(--green)}.error{color:var(--red)}.muted{color:var(--muted);line-height:1.55}@media(max-width:560px){button{width:100%}}
  </style>
</head>
<body>
<main><section class="card">
  <h1>阶段5G + 6A + 6B 双 Blob 清理</h1>
  <p class="banner"><strong>先关闭全部能力并重新部署。</strong>必须确认联合验收、普通写入、自动批准、普通类型、敏感协议、敏感审核以及全部管理员能力均为 0；只保留清理门禁、固定确认词和本轮全新清理密钥。</p>
  <p class="muted">清理器先强一致列举白名单对象并返回摘要；执行删除时摘要必须完全一致。未知 Key、对象数超限或集合变化都会在删除前中止。</p>
  <label for="cleanupKey">一次性清理密钥</label>
  <input id="cleanupKey" type="password" autocomplete="off" spellcheck="false">
  <div class="actions">
    <button id="inspectBtn" type="button">1. 强一致检查两套 Blob</button>
    <button id="executeBtn" class="danger" type="button" disabled>2. 按摘要执行删除</button>
    <button id="verifyBtn" class="secondary" type="button">3. 独立复查零对象</button>
    <button id="verifyAgainBtn" class="secondary" type="button">4. 第二次独立复查</button>
    <button id="clearBtn" class="danger" type="button">清除页面内存</button>
  </div>
  <div id="status" class="status">尚未检查。</div>
</section></main>
<script>
(() => {
  'use strict';
  const state={inspection:null,firstZeroVerified:false};
  const $=id=>document.getElementById(id);
  function edgeUrl(path){const url=new URL(path,location.origin);const here=new URL(location.href);for(const key of ['eo_token','eo_time']){const value=here.searchParams.get(key);if(value)url.searchParams.set(key,value)}return url.toString()}
  function key(){const value=$('cleanupKey').value;if(value.length<32)throw new Error('请填写至少32字符的一次性清理密钥');return value}
  async function call(body){const response=await fetch(edgeUrl('/api/stage5g6a6b/cleanup'),{method:'POST',credentials:'include',cache:'no-store',headers:{'Content-Type':'application/json','X-Cloud-Stage5g6a6b-Cleanup-Key':key()},body:JSON.stringify(body)});const payload=await response.json().catch(()=>null);if(!response.ok||!payload?.ok)throw new Error(`${payload?.error?.code||'HTTP_'+response.status}: ${payload?.error?.message||'清理请求失败'}`);return payload.data}
  function show(value,kind=''){const target=$('status');target.className=`status ${kind}`;target.textContent=typeof value==='string'?value:JSON.stringify(value,null,2)}
  $('inspectBtn').onclick=async()=>{try{const result=await call({action:'inspect'});state.inspection=result;state.firstZeroVerified=false;$('executeBtn').disabled=result.totalObjectCount===0;show(result,result.totalObjectCount===0?'ok':'')}catch(error){show(error.message,'error')}};
  $('executeBtn').onclick=async()=>{try{if(!state.inspection)throw new Error('必须先执行检查并取得对象摘要');const result=await call({action:'execute',expectedPublicKeySetDigest:state.inspection.publicKeySetDigest,expectedAdminKeySetDigest:state.inspection.adminKeySetDigest});state.inspection=null;$('executeBtn').disabled=true;state.firstZeroVerified=false;show(result,'ok')}catch(error){state.inspection=null;$('executeBtn').disabled=true;show(error.message,'error')}};
  $('verifyBtn').onclick=async()=>{try{const result=await call({action:'inspect'});if(result.totalObjectCount!==0)throw new Error(`第一次复查仍有 ${result.totalObjectCount} 个对象`);state.firstZeroVerified=true;show('第一次独立强一致复查：公共 Blob=0，管理员 Blob=0。','ok')}catch(error){state.firstZeroVerified=false;show(error.message,'error')}};
  $('verifyAgainBtn').onclick=async()=>{try{if(!state.firstZeroVerified)throw new Error('请先完成第一次独立零对象复查');const result=await call({action:'inspect'});if(result.totalObjectCount!==0)throw new Error(`第二次复查仍有 ${result.totalObjectCount} 个对象`);show('第二次独立强一致复查：公共 Blob=0，管理员 Blob=0。现在删除全部密钥、部署和 EdgeOne 项目，并关闭 PR #33。','ok')}catch(error){show(error.message,'error')}};
  $('clearBtn').onclick=()=>{state.inspection=null;state.firstZeroVerified=false;$('cleanupKey').value='';$('executeBtn').disabled=true;show('页面内存已清除。')};
})();
</script>
</body>
</html>

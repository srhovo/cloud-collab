<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; connect-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none'">
  <title>阶段5C管理员审核写入预览</title>
  <style>
    :root{font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;color-scheme:light;--blue:#0969da;--green:#1a7f37;--red:#cf222e;--amber:#9a6700;--border:#d0d7de;--muted:#57606a;--bg:#f6f8fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#1f2328}main{width:min(900px,calc(100% - 24px));margin:24px auto}.card{margin-bottom:14px;padding:18px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 8px 24px rgba(31,35,40,.07)}h1,h2,h3{margin:0 0 8px}h1{font-size:24px}h2{font-size:20px}h3{font-size:17px}p{line-height:1.6}.muted{color:var(--muted);font-size:14px}.banner{padding:12px 14px;border-left:4px solid var(--red);border-radius:8px;background:#ffebe9}.toolbar,.actions{display:flex;gap:9px;flex-wrap:wrap;margin:14px 0}.toolbar button,.actions button{min-height:42px;border:0;border-radius:8px;padding:9px 14px;background:var(--blue);color:#fff;font:750 15px system-ui;cursor:pointer}.toolbar .secondary,.actions .secondary{background:#57606a}.toolbar .danger,.actions .danger{background:var(--red)}button:disabled{opacity:.45;cursor:not-allowed}.status{padding:12px;border:1px solid var(--border);border-radius:9px;background:var(--bg);font-weight:700;white-space:pre-wrap}.ok{color:var(--green)}.error{color:var(--red)}.review{margin-top:12px;padding:14px;border:1px solid var(--border);border-radius:10px;background:#fff}.review-head{display:flex;gap:8px;justify-content:space-between;align-items:flex-start}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#fff8c5;color:#7d4e00;font-size:12px;font-weight:750}.price{margin:9px 0;font-size:17px;font-weight:800}.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:5px 12px;color:var(--muted);font-size:13px}.edit-grid{display:grid;grid-template-columns:minmax(120px,1fr) minmax(180px,1fr);gap:9px;margin-top:12px}.edit-grid input,.edit-grid select{min-height:42px;width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font:15px system-ui}.empty{padding:22px;text-align:center;color:var(--muted)}.hidden{display:none!important}@media(max-width:600px){main{margin-top:12px}.card{padding:15px}.meta,.edit-grid{grid-template-columns:1fr}.review-head{display:block}.actions button{width:100%}}
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>阶段5C：管理员审核写入预览</h1>
    <p class="muted">独立管理员入口 · 只允许合成测试作用域 · 所有动作写入不可变审计</p>
    <p class="banner"><strong>本页会修改隔离预览公共版本。</strong>每次批准、拒绝或编辑后批准都要求浏览器二次确认；正式用户价格库与正式管理员审核不在本页能力范围内。</p>
    <div class="toolbar">
      <button id="loginBtn" type="button">前往安全登录</button>
      <button id="refreshBtn" class="secondary" type="button">刷新待审核队列</button>
      <button id="logoutBtn" class="danger" type="button">退出并清除会话</button>
    </div>
    <div id="status" class="status" aria-live="polite">正在检查管理员会话……</div>
    <p id="identity" class="muted">尚未验证管理员会话。</p>
  </section>

  <section id="queueCard" class="card hidden">
    <h2>可执行审核 <span id="count" class="pill">0</span></h2>
    <p id="scope" class="muted">尚未读取合成作用域。</p>
    <div id="queue"></div>
  </section>
</main>
<script>
(() => {
  'use strict';
  const ids = ['loginBtn','refreshBtn','logoutBtn','status','identity','queueCard','count','scope','queue'];
  const els = Object.fromEntries(ids.map(id => [id, document.getElementById(id)]));
  let busy = false;

  function setBusy(value) {
    busy = value;
    for (const button of document.querySelectorAll('button')) {
      button.disabled = value || button.dataset.permanentDisabled === '1';
    }
    for (const input of document.querySelectorAll('input,select')) input.disabled = value;
  }

  function setStatus(message, kind = '') {
    els.status.textContent = message;
    els.status.className = `status ${kind}`.trim();
  }

  function clearQueue() {
    els.queue.replaceChildren();
    els.queueCard.classList.add('hidden');
    els.count.textContent = '0';
  }

  async function api(path, init = {}) {
    const response = await fetch(path, {
      credentials: 'same-origin',
      cache: 'no-store',
      redirect: 'error',
      referrerPolicy: 'no-referrer',
      ...init,
    });
    if (response.status === 204) return null;
    const payload = await response.json().catch(() => null);
    if (!response.ok || !payload?.ok) {
      const error = new Error(payload?.error?.message || `管理员审核接口失败（HTTP ${response.status}）`);
      error.code = payload?.error?.code || `HTTP_${response.status}`;
      throw error;
    }
    return payload.data;
  }

  function reasonLabel(reason) {
    return reason === 'candidate_conflict' ? '候选值冲突' : reason === 'price_change_exceeds_limit' ? '改价超过安全范围' : '需要人工审核';
  }

  function settleLabel(value) {
    return value === 'round' ? '局' : value === 'hour' ? '小时' : value;
  }

  function addMeta(container, label, value) {
    const span = document.createElement('span');
    span.textContent = `${label}：${value}`;
    container.append(span);
  }

  function assertReadCapabilities(data) {
    const caps = data?.capabilities || {};
    if (caps.reviewQueueRead !== true || caps.reviewDetailRead !== true
        || caps.reviewMutation !== false || caps.publicMutationAllowed !== false) {
      throw new Error('只读队列未保持阶段5B权限边界。');
    }
    if (data?.scope?.syntheticFixtureOnly !== true) throw new Error('审核队列不是合成测试作用域。');
  }

  function assertMutationCapabilities(data) {
    const caps = data?.capabilities || {};
    if (caps.reviewMutation !== true || caps.reviewApprove !== true
        || caps.reviewReject !== true || caps.reviewEditAndApprove !== true
        || caps.publicMutationAllowed !== true || caps.syntheticFixtureOnly !== true
        || caps.deviceMutation !== false || caps.rollback !== false || caps.export !== false) {
      throw new Error('服务器未保持阶段5C隔离写入权限边界。');
    }
  }

  async function mutate(path, body, successLabel) {
    if (busy) return;
    setBusy(true);
    setStatus('正在写入不可变决策、公共事件与审计记录……');
    try {
      const data = await api(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      assertMutationCapabilities(data);
      const result = data.result;
      setStatus(`${successLabel}：状态 ${result.status}；公共版本 ${result.publicVersion}；审计 …${result.auditId.slice(-8)}。`, 'ok');
      setBusy(false);
      await loadQueue({ preserveStatus: true });
    } catch (error) {
      setStatus(error?.message || '管理员审核动作失败。', 'error');
      setBusy(false);
    }
  }

  function reviewNode(item) {
    const article = document.createElement('article');
    article.className = 'review';
    const head = document.createElement('div');
    head.className = 'review-head';
    const title = document.createElement('h3');
    title.textContent = item.serviceName;
    const pill = document.createElement('span');
    pill.className = 'pill';
    pill.textContent = reasonLabel(item.reason);
    head.append(title, pill);

    const price = document.createElement('div');
    price.className = 'price';
    const baseline = item.baseline.unitPrice === null ? '新增' : item.baseline.unitPrice;
    price.textContent = `${baseline} → ${item.candidateUnitPrice} 元/${settleLabel(item.settleType)}`;

    const meta = document.createElement('div');
    meta.className = 'meta';
    addMeta(meta, '设备证据', `${item.distinctDeviceCount} 台`);
    addMeta(meta, '基线状态', item.baseline.stillCurrent ? '可执行' : '已过期');
    addMeta(meta, '收到时间', new Date(item.receivedAt).toLocaleString());
    addMeta(meta, '审核标记', `…${item.reviewId.slice(-8)}`);

    const editGrid = document.createElement('div');
    editGrid.className = 'edit-grid';
    const priceInput = document.createElement('input');
    priceInput.type = 'number';
    priceInput.min = '0.001';
    priceInput.max = '1000000';
    priceInput.step = '0.001';
    priceInput.value = String(item.candidateUnitPrice);
    priceInput.setAttribute('aria-label', `${item.serviceName} 编辑后单价`);
    const rejectReason = document.createElement('select');
    rejectReason.setAttribute('aria-label', `${item.serviceName} 拒绝原因`);
    for (const [value, label] of [
      ['invalid_price','价格无效'],
      ['insufficient_evidence','证据不足'],
      ['conflicting_candidates','候选冲突'],
      ['outdated_baseline','基线过期'],
      ['unsupported_change','不支持的变更'],
    ]) {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = label;
      rejectReason.append(option);
    }
    editGrid.append(priceInput, rejectReason);

    const actions = document.createElement('div');
    actions.className = 'actions';
    const approve = document.createElement('button');
    approve.type = 'button';
    approve.textContent = '批准候选值';
    approve.disabled = !item.baseline.stillCurrent;
    if (!item.baseline.stillCurrent) approve.dataset.permanentDisabled = '1';
    approve.addEventListener('click', () => {
      if (!window.confirm(`确认批准 ${item.serviceName}：${item.candidateUnitPrice} 元/${settleLabel(item.settleType)}？`)) return;
      mutate('/api/admin/reviews/approve', { reviewId: item.reviewId, confirmation: 'APPROVE' }, '批准完成');
    });
    const reject = document.createElement('button');
    reject.type = 'button';
    reject.className = 'danger';
    reject.textContent = '拒绝此候选';
    reject.addEventListener('click', () => {
      if (!window.confirm(`确认拒绝 ${item.serviceName} 的此候选值？`)) return;
      mutate('/api/admin/reviews/reject', {
        reviewId: item.reviewId,
        confirmation: 'REJECT',
        reasonCode: rejectReason.value,
      }, '拒绝完成');
    });
    const editApprove = document.createElement('button');
    editApprove.type = 'button';
    editApprove.className = 'secondary';
    editApprove.textContent = '按输入值批准';
    editApprove.disabled = !item.baseline.stillCurrent;
    if (!item.baseline.stillCurrent) editApprove.dataset.permanentDisabled = '1';
    editApprove.addEventListener('click', () => {
      const unitPrice = Number(priceInput.value);
      if (!Number.isFinite(unitPrice) || unitPrice <= 0) {
        setStatus('请输入有效的正数单价。', 'error');
        return;
      }
      if (!window.confirm(`确认把 ${item.serviceName} 改为 ${unitPrice} 元/${settleLabel(item.settleType)}并批准？`)) return;
      mutate('/api/admin/reviews/edit-and-approve', {
        reviewId: item.reviewId,
        confirmation: 'EDIT_AND_APPROVE',
        unitPrice,
      }, '编辑后批准完成');
    });
    actions.append(approve, reject, editApprove);
    article.append(head, price, meta, editGrid, actions);
    return article;
  }

  function renderQueue(data) {
    assertReadCapabilities(data);
    els.count.textContent = String(data.total);
    els.scope.textContent = `合成作用域：${data.scope.groupId} / ${data.scope.libraryId}`;
    els.queue.replaceChildren();
    if (!Array.isArray(data.items) || data.items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = '当前没有待审核合成项目。';
      els.queue.append(empty);
    } else {
      for (const item of data.items) els.queue.append(reviewNode(item));
    }
    els.queueCard.classList.remove('hidden');
  }

  async function loadQueue({ preserveStatus = false } = {}) {
    if (busy) return;
    setBusy(true);
    if (!preserveStatus) setStatus('正在强一致读取待审核队列……');
    try {
      const data = await api('/api/admin/reviews');
      renderQueue(data);
      if (!preserveStatus) setStatus(`待审核队列已加载：${data.total} 项。`, 'ok');
    } catch (error) {
      clearQueue();
      setStatus(error?.message || '待审核队列加载失败。', 'error');
    } finally {
      setBusy(false);
    }
  }

  async function initialize() {
    setBusy(true);
    try {
      const session = await api('/api/admin/auth/session');
      if (!session?.authenticated) throw new Error('管理员会话无效。');
      els.identity.textContent = `${session.username} · 会话…${session.sessionIdSuffix} · 到期 ${new Date(session.expiresAt).toLocaleString()}`;
      setBusy(false);
      await loadQueue();
    } catch (error) {
      clearQueue();
      els.identity.textContent = '没有有效管理员会话；请先前往独立安全登录页。';
      const expected = ['ADMIN_SESSION_MISSING','ADMIN_SESSION_INVALID','ADMIN_SESSION_EXPIRED','ADMIN_PREVIEW_DISABLED'].includes(error?.code);
      setStatus(expected ? '请先完成管理员安全登录。' : (error?.message || '会话检查失败。'), expected ? '' : 'error');
      setBusy(false);
    }
  }

  els.loginBtn.addEventListener('click', () => { window.location.href = '/admin-preview.html'; });
  els.refreshBtn.addEventListener('click', () => loadQueue());
  els.logoutBtn.addEventListener('click', async () => {
    if (busy) return;
    setBusy(true);
    try {
      await api('/api/admin/auth/logout', { method: 'POST' });
      clearQueue();
      els.identity.textContent = '管理员会话已清除。';
      setStatus('已退出；审核内容已从页面清除。', 'ok');
    } catch (error) {
      setStatus(error?.message || '退出失败。', 'error');
    } finally {
      setBusy(false);
    }
  });

  window.addEventListener('pagehide', clearQueue);
  initialize();
})();
</script>
</body>
</html>

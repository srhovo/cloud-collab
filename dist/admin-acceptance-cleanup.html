<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; connect-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none'">
  <title>阶段5A验收清理（禁止合并）</title>
  <style>
    :root{font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;color-scheme:light;--red:#cf222e;--blue:#0969da;--green:#1a7f37;--border:#d0d7de;--muted:#57606a}*{box-sizing:border-box}body{margin:0;background:#f6f8fa;color:#1f2328}main{width:min(640px,calc(100% - 24px));margin:24px auto}.card{padding:20px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 8px 24px rgba(31,35,40,.08)}h1{margin:0 0 8px;font-size:23px}p{line-height:1.65}.warning{padding:12px 14px;border-left:4px solid var(--red);border-radius:8px;background:#ffebe9}.muted{color:var(--muted);font-size:14px}label{display:block;margin:16px 0 6px;font-weight:750}input{width:100%;min-height:46px;padding:10px 12px;border:1px solid #8c959f;border-radius:8px;font-size:16px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{min-height:44px;border:0;border-radius:8px;padding:10px 15px;background:var(--blue);color:#fff;font:750 16px system-ui}button.danger{background:var(--red)}button:disabled{opacity:.45}.status{margin-top:16px;padding:12px;border:1px solid var(--border);border-radius:9px;background:#f6f8fa;font-weight:700;white-space:pre-wrap}.ok{color:var(--green)}.error{color:var(--red)}@media(max-width:560px){main{margin-top:12px}.card{padding:16px}.actions button{flex:1 1 180px}}
  </style>
</head>
<body>
<main><section class="card">
  <h1>阶段5A验收清理</h1>
  <p class="warning"><strong>临时工具，禁止合并。</strong>只能检查和删除独立管理员预览命名空间中的登录限流合成对象；不能读取或修改公共价格、审核、设备或正式用户数据。</p>
  <label for="cleanupKey">临时验收清理密钥</label>
  <input id="cleanupKey" type="password" maxlength="256" autocomplete="off" spellcheck="false">
  <div class="actions">
    <button id="statusBtn" type="button">强一致检查对象数</button>
    <button id="cleanupBtn" class="danger" type="button">删除并强一致复查</button>
  </div>
  <div id="status" class="status" aria-live="polite">尚未检查。</div>
  <p class="muted">密钥会在请求发出前从输入框清空，不写入LocalStorage、SessionStorage、IndexedDB、日志或页面结果。清理完成必须显示剩余对象0。</p>
</section></main>
<script>
(() => {
  'use strict';
  const keyInput = document.getElementById('cleanupKey');
  const status = document.getElementById('status');
  const buttons = [document.getElementById('statusBtn'), document.getElementById('cleanupBtn')];
  let busy = false;

  function setBusy(value) {
    busy = value;
    buttons.forEach(button => { button.disabled = value; });
  }

  function setStatus(message, kind = '') {
    status.textContent = message;
    status.className = `status ${kind}`.trim();
  }

  async function call(path, method, body = null) {
    let key = String(keyInput.value || '');
    keyInput.value = '';
    if (key.length < 32) throw new Error('请输入至少32字节的临时验收清理密钥。');
    const headers = { 'X-Cloud-Admin-Acceptance-Key': key };
    if (body) headers['Content-Type'] = 'application/json';
    const response = await fetch(path, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
      credentials: 'same-origin',
      cache: 'no-store',
      redirect: 'error',
      referrerPolicy: 'no-referrer',
    });
    key = '';
    const payload = await response.json().catch(() => null);
    if (!response.ok || !payload?.ok) {
      const error = new Error(payload?.error?.message || `验收清理请求失败（HTTP ${response.status}）`);
      error.code = payload?.error?.code || `HTTP_${response.status}`;
      throw error;
    }
    if (payload.data?.publicMutationAllowed !== false
        || payload.data?.reviewMutationAllowed !== false
        || payload.data?.acceptanceCleanupOnly !== true) {
      throw new Error('服务器未保持验收清理权限边界。');
    }
    return payload.data;
  }

  document.getElementById('statusBtn').addEventListener('click', async () => {
    if (busy) return;
    setBusy(true);
    setStatus('正在强一致检查管理员验收对象……');
    try {
      const data = await call('/api/admin/acceptance/status', 'GET');
      setStatus(`强一致对象数：${data.objectCount}\n命名空间已清空：${data.namespaceClean ? '是' : '否'}`, data.namespaceClean ? 'ok' : '');
    } catch (error) {
      setStatus(error?.message || '检查失败。', 'error');
    } finally {
      setBusy(false);
    }
  });

  document.getElementById('cleanupBtn').addEventListener('click', async () => {
    if (busy) return;
    if (!window.confirm('只删除阶段5A管理员登录限流合成对象，并强一致复查剩余0。确认继续？')) return;
    setBusy(true);
    setStatus('正在删除并强一致复查……');
    try {
      const data = await call('/api/admin/acceptance/cleanup', 'POST', {
        schemaVersion: 1,
        confirm: 'DELETE_STAGE5A_ADMIN_ACCEPTANCE_OBJECTS',
      });
      setStatus(`已删除：${data.deletedObjectCount}\n强一致剩余：${data.remainingObjectCount}\n命名空间已清空：${data.namespaceClean ? '是' : '否'}`, data.remainingObjectCount === 0 ? 'ok' : 'error');
    } catch (error) {
      setStatus(error?.message || '清理失败。', 'error');
    } finally {
      setBusy(false);
    }
  });

  window.addEventListener('pagehide', () => { keyInput.value = ''; });
})();
</script>
</body>
</html>

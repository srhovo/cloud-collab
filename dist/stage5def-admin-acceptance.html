<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; connect-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none'">
  <title>阶段5D+5E+5F管理员联合验收</title>
  <style>
    :root{font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;color-scheme:light;--blue:#0969da;--green:#1a7f37;--red:#cf222e;--amber:#9a6700;--border:#d0d7de;--muted:#57606a;--bg:#f6f8fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#1f2328}main{width:min(920px,calc(100% - 24px));margin:18px auto 50px}.card{margin-bottom:14px;padding:18px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 8px 24px rgba(31,35,40,.06)}h1,h2{margin:0 0 10px}h1{font-size:24px}h2{font-size:20px}.banner{padding:11px 13px;border-left:4px solid var(--amber);border-radius:8px;background:#fff8c5;line-height:1.55}label{display:block;margin:12px 0 6px;font-weight:750}input{width:100%;min-height:44px;border:1px solid #8c959f;border-radius:8px;padding:9px;font:16px system-ui}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px}button{min-height:42px;border:0;border-radius:8px;padding:9px 14px;background:var(--blue);color:#fff;font:750 15px system-ui;cursor:pointer}button.secondary{background:#656d76}button.danger{background:var(--red)}button:disabled{opacity:.45}.status{margin-top:13px;padding:12px;border:1px solid var(--border);border-radius:9px;background:var(--bg);font-weight:700;white-space:pre-wrap;line-height:1.55}.ok{color:var(--green)}.error{color:var(--red)}.step{display:grid;grid-template-columns:32px 1fr;gap:9px;padding:9px 0;border-bottom:1px solid #eaeef2}.step:last-child{border-bottom:0}.badge{display:grid;place-items:center;width:28px;height:28px;border-radius:999px;background:#d8dee4;font-weight:800}.step.ok .badge{background:#dafbe1;color:var(--green)}.step.error .badge{background:#ffebe9;color:var(--red)}.muted{color:var(--muted);font-size:13px}@media(max-width:560px){.actions button{width:100%}}
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>阶段5D + 5E + 5F 管理员能力联合验收</h1>
    <p class="banner"><strong>一次性合成环境。</strong>先创建全新的EdgeOne临时项目并配置本轮独立凭据。本页只使用fixture公共库；完成后必须切换到清理部署并销毁全部资源。</p>
    <label for="acceptanceKey">联合验收密钥</label>
    <input id="acceptanceKey" type="password" autocomplete="off" spellcheck="false">
    <label for="username">管理员用户名</label>
    <input id="username" autocomplete="username" spellcheck="false">
    <label for="password">管理员密码</label>
    <input id="password" type="password" autocomplete="current-password">
    <div class="actions">
      <button id="seedBtn" type="button">创建并核验合成种子</button>
      <button id="loginBtn" type="button">管理员安全登录</button>
      <button id="runBtn" type="button">运行设备治理、回滚与导出联合验收</button>
      <button id="statusBtn" class="secondary" type="button">读取强一致验收状态</button>
      <button id="logoutBtn" class="danger" type="button">退出并清除页面状态</button>
    </div>
    <div id="status" class="status" aria-live="polite">尚未开始。</div>
  </section>

  <section class="card">
    <h2>验收步骤</h2>
    <div id="steps"></div>
  </section>
</main>
<script>
(() => {
  'use strict';
  const $ = id => document.getElementById(id);
  const els = Object.fromEntries(['acceptanceKey','username','password','seedBtn','loginBtn','runBtn','statusBtn','logoutBtn','status','steps'].map(id => [id,$(id)]));
  const state = { busy:false, devices:null, rollbackBody:null, exportBody:null };
  const stepNames = [
    '合成种子与强一致基线',
    '管理员登录与会话恢复',
    '设备A设为可信并撤销可信',
    '设备B封禁后认证失败关闭',
    '设备B解除封禁后认证恢复',
    '公共数据回滚与同请求幂等',
    '过期回滚目标稳定拒绝',
    'ZIP导出、完整性与同请求幂等',
    '最终强一致状态可清理',
  ];
  const stepState = stepNames.map(name => ({name,status:'pending',detail:'待执行'}));

  function renderSteps(){
    els.steps.replaceChildren();
    stepState.forEach((item,index)=>{
      const row=document.createElement('div');
      row.className=`step ${item.status==='passed'?'ok':item.status==='failed'?'error':''}`;
      row.innerHTML=`<div class="badge">${index+1}</div><div><strong>${escapeHtml(item.name)}</strong><div class="muted">${escapeHtml(item.detail)}</div></div>`;
      els.steps.append(row);
    });
  }
  function setStep(index,status,detail){stepState[index]={...stepState[index],status,detail};renderSteps();}
  function setStatus(message,kind=''){els.status.textContent=message;els.status.className=`status ${kind}`.trim();}
  function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
  function apiUrl(path){const url=new URL(path,location.origin);const current=new URL(location.href);for(const name of ['eo_token','eo_time']){const value=current.searchParams.get(name);if(value)url.searchParams.set(name,value);}return url;}
  function randomId(prefix){const bytes=new Uint8Array(16);crypto.getRandomValues(bytes);const value=btoa(String.fromCharCode(...bytes)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/g,'');return `${prefix}${value}`;}
  function acceptanceHeaders(){const key=String(els.acceptanceKey.value||'');return {'Content-Type':'application/json','x-cloud-stage5def-acceptance-key':key};}
  async function fetchJson(path,options={}){
    let response;
    try{response=await fetch(apiUrl(path),{credentials:'same-origin',cache:'no-store',redirect:'error',referrerPolicy:'no-referrer',...options});}
    catch(_){const error=new Error('网络请求失败');error.code='NETWORK_ERROR';throw error;}
    const payload=await response.json().catch(()=>null);
    if(!response.ok||!payload?.ok){const error=new Error(payload?.error?.message||`HTTP ${response.status}`);error.code=payload?.error?.code||`HTTP_${response.status}`;error.status=response.status;throw error;}
    return payload;
  }
  async function expectError(task,code){try{await task();}catch(error){if(error.code===code)return error;throw error;}const error=new Error(`预期错误 ${code} 未出现`);error.code='EXPECTED_ERROR_MISSING';throw error;}
  async function digest(bytes){const hash=await crypto.subtle.digest('SHA-256',bytes);return [...new Uint8Array(hash)].map(x=>x.toString(16).padStart(2,'0')).join('');}
  async function seed(){
    setStatus('正在创建并强一致核验合成设备与两份公共批准值……');
    const payload=await fetchJson('/api/stage5def/acceptance/seed',{method:'POST',headers:acceptanceHeaders(),body:JSON.stringify({schemaVersion:1,confirmation:'SEED_STAGE5DEF_SYNTHETIC_V1'})});
    state.devices=Object.fromEntries(payload.data.result.devices.map(item=>[item.slot,item.deviceRef]));
    setStep(0,'passed',`公共版本 ${payload.data.result.publicVersion}，当前单价 ${payload.data.result.currentUnitPrice}`);
    setStatus('合成种子就绪。请进行管理员登录。','ok');
  }
  async function login(){
    const username=String(els.username.value||'').trim();const password=String(els.password.value||'');els.password.value='';
    setStatus('正在管理员安全登录……');
    await fetchJson('/api/admin/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({schemaVersion:1,username,password})});
    const session=await fetchJson('/api/admin/auth/session');
    setStep(1,'passed',`会话已恢复，到期 ${new Date(session.data.expiresAt).toLocaleString()}`);
    setStatus('管理员登录和会话恢复通过。','ok');
  }
  async function governance(){
    if(!state.devices)throw Object.assign(new Error('请先创建合成种子'),{code:'SEED_REQUIRED'});
    const mutate=async(path,deviceRef,reasonCode,requestId)=>fetchJson(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({schemaVersion:1,deviceRef,requestId,reasonCode})});
    await mutate('/api/admin/devices/trust',state.devices.A,'verified_operator',randomId('dgrq_v1_'));
    await mutate('/api/admin/devices/revoke-trust',state.devices.A,'trust_withdrawn',randomId('dgrq_v1_'));
    setStep(2,'passed','设备A治理版本完成可信→撤销可信');
    await mutate('/api/admin/devices/block',state.devices.B,'manual_safety',randomId('dgrq_v1_'));
    await expectError(()=>fetchJson('/api/stage5def/acceptance/device-auth',{method:'POST',headers:acceptanceHeaders(),body:JSON.stringify({schemaVersion:1,slot:'B'})}),'DEVICE_BLOCKED');
    setStep(3,'passed','封禁后固定设备令牌返回 DEVICE_BLOCKED');
    await mutate('/api/admin/devices/unblock',state.devices.B,'manual_review_cleared',randomId('dgrq_v1_'));
    const auth=await fetchJson('/api/stage5def/acceptance/device-auth',{method:'POST',headers:acceptanceHeaders(),body:JSON.stringify({schemaVersion:1,slot:'B'})});
    if(!auth.data.result.authenticated)throw Object.assign(new Error('解除封禁后认证未恢复'),{code:'AUTH_NOT_RESTORED'});
    setStep(4,'passed','解除封禁不会恢复可信，但设备认证已恢复');
  }
  async function rollback(){
    const list=await fetchJson('/api/admin/rollbacks');
    const candidate=list.data.result.candidates.find(item=>item.currentUnitPrice===120&&item.previousUnitPrice===100)||list.data.result.candidates[0];
    if(!candidate)throw Object.assign(new Error('没有可用回滚候选'),{code:'ROLLBACK_CANDIDATE_MISSING'});
    state.rollbackBody={schemaVersion:1,rollbackRef:candidate.rollbackRef,requestId:randomId('rbrq_v1_'),confirmation:'ROLLBACK_TO_PREVIOUS_APPROVED_VALUE'};
    const first=await fetchJson('/api/admin/rollbacks/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state.rollbackBody)});
    const replay=await fetchJson('/api/admin/rollbacks/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state.rollbackBody)});
    if(first.data.result.publicVersion!==3||first.data.result.restoredUnitPrice!==100||replay.data.result.duplicate!==true)throw Object.assign(new Error('回滚版本或幂等结果不一致'),{code:'ROLLBACK_RESULT_INVALID'});
    setStep(5,'passed','公共版本 2→3，单价 120→100；同请求重放未重复递增');
    await expectError(()=>fetchJson('/api/admin/rollbacks/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...state.rollbackBody,requestId:randomId('rbrq_v1_')})}),'ADMIN_ROLLBACK_TARGET_STALE');
    setStep(6,'passed','旧rollbackRef返回 ADMIN_ROLLBACK_TARGET_STALE');
  }
  async function exportBundle(){
    const summary=await fetchJson('/api/admin/exports/summary');
    state.exportBody={schemaVersion:1,requestId:randomId('exrq_v1_'),confirmation:'EXPORT_SYNTHETIC_PUBLIC_DATABASE'};
    const download=async()=>{
      const response=await fetch(apiUrl('/api/admin/exports/download'),{method:'POST',credentials:'same-origin',cache:'no-store',redirect:'error',referrerPolicy:'no-referrer',headers:{'Content-Type':'application/json'},body:JSON.stringify(state.exportBody)});
      if(!response.ok){const payload=await response.json().catch(()=>null);const error=new Error(payload?.error?.message||`HTTP ${response.status}`);error.code=payload?.error?.code||`HTTP_${response.status}`;throw error;}
      const bytes=await response.arrayBuffer();
      const view=new Uint8Array(bytes);
      if(response.headers.get('content-type')!=='application/zip'||view[0]!==0x50||view[1]!==0x4b||view[2]!==0x03||view[3]!==0x04)throw Object.assign(new Error('ZIP响应格式无效'),{code:'ZIP_INVALID'});
      return {bytes,packageId:response.headers.get('x-mdq-package-id'),publicVersion:Number(response.headers.get('x-mdq-public-version')),fileCount:Number(response.headers.get('x-mdq-file-count')),duplicate:response.headers.get('x-mdq-duplicate')};
    };
    const first=await download();const replay=await download();
    if(first.publicVersion!==3||summary.data.result.publicVersion!==3||first.packageId!==replay.packageId||first.fileCount!==replay.fileCount||replay.duplicate!=='1'||await digest(first.bytes)!==await digest(replay.bytes))throw Object.assign(new Error('导出包或幂等结果不一致'),{code:'EXPORT_RESULT_INVALID'});
    const blob=new Blob([first.bytes],{type:'application/zip'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='码单器公共数据库_阶段5DEF联合验收.zip';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);
    setStep(7,'passed',`公共版本3；${first.fileCount}个文件；package ${String(first.packageId).slice(-8)}`);
  }
  async function readStatus(){
    const payload=await fetchJson('/api/stage5def/acceptance/status',{headers:{'x-cloud-stage5def-acceptance-key':String(els.acceptanceKey.value||'')}});
    const result=payload.data.result;
    if(result.readyForCleanup)setStep(8,'passed',`公共对象 ${result.publicObjectCount}；治理/回滚/导出审计 ${result.audits.governance}/${result.audits.rollback}/${result.audits.export}`);
    else setStep(8,'failed',`尚未完成：治理=${result.governanceComplete} 回滚=${result.rollbackComplete} 导出=${result.exportComplete}`);
    setStatus(JSON.stringify({publicVersion:result.publicVersion,currentUnitPrice:result.currentUnitPrice,audits:result.audits,readyForCleanup:result.readyForCleanup},null,2),result.readyForCleanup?'ok':'error');
    return result;
  }
  async function runAll(){
    if(state.busy)return;state.busy=true;setStatus('正在运行联合验收，请勿重复点击……');
    try{await governance();await rollback();await exportBundle();const result=await readStatus();if(!result.readyForCleanup)throw Object.assign(new Error('最终状态尚不可清理'),{code:'FINAL_STATUS_INCOMPLETE'});setStatus('联合验收全部通过。现在退出，然后切换为清理部署。','ok');}
    catch(error){const pending=stepState.findIndex(item=>item.status==='pending');if(pending>=0)setStep(pending,'failed',`${error.code||'ERROR'}：${error.message||'失败'}`);setStatus(`错误码：${error.code||'ERROR'}\n${error.message||'联合验收失败'}`,'error');}
    finally{state.busy=false;}
  }
  async function logout(){
    try{await fetchJson('/api/admin/auth/logout',{method:'POST'});}catch(_){}
    els.password.value='';els.acceptanceKey.value='';state.devices=null;state.rollbackBody=null;state.exportBody=null;stepState.forEach(item=>{item.status='pending';item.detail='待执行';});renderSteps();setStatus('已退出并清除页面内存状态。','ok');
  }
  async function guard(task){if(state.busy)return;state.busy=true;try{await task();}catch(error){setStatus(`错误码：${error.code||'ERROR'}\n${error.message||'请求失败'}`,'error');}finally{state.busy=false;}}
  els.seedBtn.addEventListener('click',()=>guard(seed));els.loginBtn.addEventListener('click',()=>guard(login));els.runBtn.addEventListener('click',runAll);els.statusBtn.addEventListener('click',()=>guard(readStatus));els.logoutBtn.addEventListener('click',()=>guard(logout));window.addEventListener('pagehide',()=>{els.password.value='';els.acceptanceKey.value='';});renderSteps();
})();
</script>
</body>
</html>

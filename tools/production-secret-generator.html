<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self'; script-src 'self'; connect-src 'none'; img-src 'none'; media-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <title>码单器生产配置离线生成器</title>
  <link rel="stylesheet" href="./production-secret-generator.css">
</head>
<body>
  <main>
    <h1>码单器生产配置离线生成器</h1>
    <p class="warning">仅在可信设备本地打开。页面不联网、不保存、不上传；生成后复制到密码管理器和 EdgeOne 私密环境变量。</p>

    <section aria-labelledby="origin-title">
      <h2 id="origin-title">未来正式入口</h2>
      <label>普通用户 HTTPS 来源
        <input id="publicOrigin" inputmode="url" autocomplete="off" spellcheck="false" placeholder="https://app.example.com">
      </label>
      <label>管理员 HTTPS 来源
        <input id="adminOrigin" inputmode="url" autocomplete="off" spellcheck="false" placeholder="https://admin.example.com">
      </label>
      <p class="hint">没有自定义域名时保持空。不得填写包含 eo_token 的临时预览链接。</p>
    </section>

    <section aria-labelledby="value-title">
      <h2 id="value-title">八项独立随机值</h2>
      <div id="valueRows" class="rows" aria-live="polite">
        <div class="row"><label for="private-1">CLOUD_ADMIN_PASSWORD</label><input id="private-1" data-private-name="CLOUD_ADMIN_PASSWORD" readonly autocomplete="off" spellcheck="false"><button type="button" data-select-target="private-1" disabled>选中此项</button></div>
        <div class="row"><label for="private-2">CLOUD_PRODUCTION_CLIENT_ACCESS_KEY</label><input id="private-2" data-private-name="CLOUD_PRODUCTION_CLIENT_ACCESS_KEY" readonly autocomplete="off" spellcheck="false"><button type="button" data-select-target="private-2" disabled>选中此项</button></div>
        <div class="row"><label for="private-3">CLOUD_PRODUCTION_RATE_LIMIT_SALT</label><input id="private-3" data-private-name="CLOUD_PRODUCTION_RATE_LIMIT_SALT" readonly autocomplete="off" spellcheck="false"><button type="button" data-select-target="private-3" disabled>选中此项</button></div>
        <div class="row"><label for="private-4">CLOUD_ADMIN_SESSION_SECRET</label><input id="private-4" data-private-name="CLOUD_ADMIN_SESSION_SECRET" readonly autocomplete="off" spellcheck="false"><button type="button" data-select-target="private-4" disabled>选中此项</button></div>
        <div class="row"><label for="private-5">CLOUD_ADMIN_RATE_LIMIT_SALT</label><input id="private-5" data-private-name="CLOUD_ADMIN_RATE_LIMIT_SALT" readonly autocomplete="off" spellcheck="false"><button type="button" data-select-target="private-5" disabled>选中此项</button></div>
        <div class="row"><label for="private-6">CLOUD_ADMIN_DEVICE_REF_SALT</label><input id="private-6" data-private-name="CLOUD_ADMIN_DEVICE_REF_SALT" readonly autocomplete="off" spellcheck="false"><button type="button" data-select-target="private-6" disabled>选中此项</button></div>
        <div class="row"><label for="private-7">CLOUD_ADMIN_ROLLBACK_REF_SALT</label><input id="private-7" data-private-name="CLOUD_ADMIN_ROLLBACK_REF_SALT" readonly autocomplete="off" spellcheck="false"><button type="button" data-select-target="private-7" disabled>选中此项</button></div>
        <div class="row"><label for="private-8">CLOUD_ADMIN_EXPORT_AUDIT_SALT</label><input id="private-8" data-private-name="CLOUD_ADMIN_EXPORT_AUDIT_SALT" readonly autocomplete="off" spellcheck="false"><button type="button" data-select-target="private-8" disabled>选中此项</button></div>
      </div>
      <div class="actions">
        <button id="generate" type="button">生成全部</button>
        <button id="clear" type="button" class="secondary">清空页面</button>
      </div>
    </section>

    <textarea id="baseLines" hidden>CLOUD_PRODUCTION_ENABLED=0
CLOUD_PRODUCTION_READ_SYNC_ENABLED=0
CLOUD_PRODUCTION_ORDINARY_SUBMISSION_ENABLED=0
CLOUD_PRODUCTION_AUTO_APPROVAL_ENABLED=0
CLOUD_PRODUCTION_SENSITIVE_SUBMISSION_ENABLED=0
CLOUD_PRODUCTION_ADMIN_REVIEW_ENABLED=0
CLOUD_PRODUCTION_DEVICE_GOVERNANCE_ENABLED=0
CLOUD_PRODUCTION_EXPORT_ENABLED=0
CLOUD_ADMIN_PRODUCTION_ENABLED=0
CLOUD_PRODUCTION_BOOTSTRAP_ENABLED=0
CLOUD_PRODUCTION_BOOTSTRAP_CONFIRMATION=
CLOUD_PRODUCTION_EXTERNAL_CLUB_ID=see
CLOUD_PRODUCTION_EXTERNAL_LIBRARY_ID=see_cz
CLOUD_PRODUCTION_GROUP_ID=group_see
CLOUD_PRODUCTION_LIBRARY_ID=lib_see_cz
CLOUD_PRODUCTION_BLOB_STORE_NAME=cloud-collab-production-v1
CLOUD_ADMIN_PRODUCTION_BLOB_STORE_NAME=cloud-collab-admin-production-v1
CLOUD_ADMIN_USERNAME=xiaxue</textarea>

    <section aria-labelledby="env-title">
      <h2 id="env-title">EdgeOne 批量导入文本</h2>
      <textarea id="envBlock" rows="30" readonly spellcheck="false" aria-label="环境变量批量导入文本"></textarea>
      <div class="actions"><button id="selectAll" type="button" disabled>选中全部文本</button></div>
      <p id="status" role="status" aria-live="polite">尚未生成。</p>
    </section>

    <section>
      <h2>安全边界</h2>
      <ul>
        <li>所有生产功能开关均保持 0。</li>
        <li>初始化确认词保持空。</li>
        <li>关闭页面或切到后台时清空内存中的随机值。</li>
        <li>工具不调用网络、浏览器存储或剪贴板接口。</li>
        <li>聊天中出现过的旧密码不得再次使用。</li>
      </ul>
    </section>
  </main>
  <script src="./production-secret-generator.js" defer></script>
</body>
</html>

<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="referrer" content="no-referrer"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; connect-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none'; frame-ancestors 'none'"><title>码单器正式敏感审核控制台</title><style>:root{font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;--b:#0969da;--g:#1a7f37;--r:#cf222e;--bd:#d0d7de;--m:#57606a}*{box-sizing:border-box}body{margin:0;background:#f6f8fa;color:#1f2328}main{width:min(1000px,calc(100% - 24px));margin:20px auto}.card{margin:0 0 14px;padding:18px;border:1px solid var(--bd);border-radius:14px;background:#fff}h1,h2{margin:0 0 10px}.muted{color:var(--m)}label{display:block;margin:10px 0 5px;font-weight:700}input,textarea{width:100%;padding:10px;border:1px solid #8c959f;border-radius:8px;font:15px ui-monospace,monospace}textarea{min-height:90px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button{border:0;border-radius:8px;padding:10px 14px;background:var(--b);color:#fff;font-weight:700}button.ok{background:var(--g)}button.danger{background:var(--r)}button:disabled{opacity:.45}.status,pre{padding:11px;border:1px solid var(--bd);border-radius:8px;background:#f6f8fa;white-space:pre-wrap;word-break:break-word}.hidden{display:none!important}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid var(--bd);text-align:left}tbody tr{cursor:pointer}tbody tr:hover{background:#f6f8fa}@media(max-width:700px){.row{grid-template-columns:1fr}table{display:block;overflow:auto}}</style></head><body><main>
<section class="card"><h1>正式敏感审核控制台</h1><p class="muted">独立管理员入口，不属于普通用户三文件发布包。敏感变化全部人工审核。</p></section>
<section class="card"><h2>管理员会话</h2><div class="row"><div><label>用户名</label><input id="username" autocomplete="username"></div><div><label>密码</label><input id="password" type="password" autocomplete="current-password"></div></div><div class="actions"><button id="login">登录</button><button id="session">检查会话</button><button id="logout" class="danger">退出</button></div><div id="authStatus" class="status">正在检查会话……</div></section>
<section id="queueCard" class="card hidden"><h2>待审核队列</h2><div class="actions"><button id="refresh">刷新</button><button id="more">加载更多</button></div><div id="queueStatus" class="status">尚未读取。</div><table><thead><tr><th>类型</th><th>操作</th><th>原因</th><th>提交时间</th></tr></thead><tbody id="rows"></tbody></table></section>
<section id="detailCard" class="card hidden"><h2>审核详情</h2><div class="row"><div><label>reviewId</label><input id="reviewId" readonly></div><div><label>候选摘要</label><input id="digest" readonly></div><div><label>公共版本</label><input id="version" readonly></div><div><label>数据类型</label><input id="type" readonly></div></div><label>详情</label><pre id="detail">—</pre><label>审计备注</label><textarea id="note"></textarea><label>修改后正文JSON</label><textarea id="edited"></textarea><div class="actions"><button id="approve" class="ok">批准</button><button id="reject" class="danger">拒绝</button><button id="editApprove">修改后批准</button></div><div id="actionStatus" class="status">请选择一条候选。</div></section>
</main><script>(()=>{'use strict';const $=id=>document.getElementById(id),e={username:$('username'),password:$('password'),authStatus:$('authStatus'),queueCard:$('queueCard'),queueStatus:$('queueStatus'),rows:$('rows'),more:$('more'),detailCard:$('detailCard'),reviewId:$('reviewId'),digest:$('digest'),version:$('version'),type:$('type'),detail:$('detail'),note:$('note'),edited:$('edited'),actionStatus:$('actionStatus')};let busy=false,cursor='',current=null;const buttons=()=>document.querySelectorAll('button');function setBusy(v){busy=v;for(const b of buttons())b.disabled=v;}function status(node,msg){node.textContent=msg;}async function api(path,init={}){const r=await fetch(path,{credentials:'same-origin',cache:'no-store',redirect:'error',referrerPolicy:'no-referrer',...init,headers:init.body?{'Content-Type':'application/json'}:undefined});let p=null;try{p=await r.json();}catch(_){}if(!r.ok||!p?.ok)throw Object.assign(new Error(p?.error?.message||`HTTP ${r.status}`),{code:p?.error?.code});return p.data;}function showSession(data){e.queueCard.classList.remove('hidden');status(e.authStatus,`已登录：${data.username}；到期 ${new Date(data.expiresAt).toLocaleString()}`);}function clear(){e.queueCard.classList.add('hidden');e.detailCard.classList.add('hidden');e.rows.textContent='';cursor='';current=null;}async function check(){if(busy)return;setBusy(true);try{showSession(await api('/api/admin/auth/session'));await load(true);}catch(err){clear();status(e.authStatus,'当前没有有效管理员会话。');}finally{setBusy(false);}}async function login(){if(busy)return;const username=e.username.value.trim();let password=e.password.value;if(!username||!password){status(e.authStatus,'请输入用户名和密码。');return;}let body=JSON.stringify({schemaVersion:1,username,password});password='';e.password.value='';setBusy(true);try{showSession(await api('/api/admin/auth/login',{method:'POST',body}));body='';await load(true);}catch(err){body='';clear();status(e.authStatus,err.message);}finally{setBusy(false);}}async function logout(){setBusy(true);try{await api('/api/admin/auth/logout',{method:'POST'});clear();status(e.authStatus,'已退出。');}catch(err){status(e.authStatus,err.message);}finally{setBusy(false);}}function render(items,append){if(!append)e.rows.textContent='';for(const item of items||[]){const tr=document.createElement('tr');for(const v of [item.dataType,item.operation,item.reason,item.clientCreatedAt||item.receivedAt||'—']){const td=document.createElement('td');td.textContent=String(v??'—');tr.appendChild(td);}tr.onclick=()=>detail(item.reviewId);e.rows.appendChild(tr);}}async function load(reset){if(reset)cursor='';const q=new URLSearchParams({limit:'20'});if(!reset&&cursor)q.set('cursor',cursor);try{const data=await api(`/api/admin/sensitive-reviews?${q}`);render(data.items,!reset);cursor=data.nextCursor||'';e.more.disabled=!cursor;status(e.queueStatus,`读取 ${data.items?.length||0} 条；${cursor?'仍有下一页':'已到末尾'}`);}catch(err){status(e.queueStatus,err.message);}}async function detail(id){setBusy(true);try{const d=await api(`/api/admin/sensitive-reviews/detail?id=${encodeURIComponent(id)}`);current=d;e.reviewId.value=d.reviewId||id;e.digest.value=d.candidateDigest||d.candidate?.candidateDigest||'';e.version.value=String(d.publicVersion??d.expectedPublicVersion??0);e.type.value=d.dataType||d.candidate?.dataType||'';e.detail.textContent=JSON.stringify(d,null,2);e.edited.value=JSON.stringify(d.candidate?.payload||d.payload||{},null,2);e.detailCard.classList.remove('hidden');status(e.actionStatus,'请核对候选摘要和公共版本。');}catch(err){status(e.queueStatus,err.message);}finally{setBusy(false);}}function common(action,confirmation){return{schemaVersion:1,action,reviewId:e.reviewId.value,expectedCandidateDigest:e.digest.value,expectedPublicVersion:Number(e.version.value),confirmation,auditNote:e.note.value.trim()};}async function act(kind){if(!current||busy)return;let path,body;if(kind==='approve'){path='/api/admin/sensitive-reviews/approve';body=common('approve','APPROVE_SENSITIVE_CANDIDATE');}else if(kind==='reject'){path='/api/admin/sensitive-reviews/reject';body=common('reject','REJECT_SENSITIVE_CANDIDATE');}else{path='/api/admin/sensitive-reviews/edit-and-approve';body=common('edit_and_approve','EDIT_AND_APPROVE_SENSITIVE_CANDIDATE');try{body.editedPayload=JSON.parse(e.edited.value);}catch(_){status(e.actionStatus,'修改后正文不是有效JSON。');return;}}setBusy(true);try{const d=await api(path,{method:'POST',body:JSON.stringify(body)});status(e.actionStatus,`操作完成：${d.status||kind}`);e.detailCard.classList.add('hidden');current=null;await load(true);}catch(err){status(e.actionStatus,err.message);}finally{setBusy(false);}}$('login').onclick=login;$('session').onclick=check;$('logout').onclick=logout;$('refresh').onclick=()=>load(true);$('more').onclick=()=>load(false);$('approve').onclick=()=>act('approve');$('reject').onclick=()=>act('reject');$('editApprove').onclick=()=>act('edit');check();})();</script></body></html>
